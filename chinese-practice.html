<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>你好！中国語アウトプット練習</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet"
  />

  <style>
    :root {
      --bg: #fff5f7;
      --bg-soft: #ffe7ee;
      --pink-light: #ffd0dd;
      --pink: #ff8fa9;
      --pink-deep: #e76b8a;
      --pink-darker: #c84d6e;
      --cream: #fffaf9;
      --white: #ffffff;
      --ink: #4a2f3a;
      --ink-soft: #8a6a76;
      --ink-mute: #b69aa3;
      --line: #f3d9d3;
      --green: #6db99e;
      --green-soft: #d8f0e6;
      --red: #e76b6b;
      --red-soft: #fde2e2;
      --yellow: #f5c46b;
      --yellow-soft: #fbecc7;
      --shadow: 0 14px 30px -18px rgba(231, 107, 138, 0.45);
      --shadow-lg: 0 26px 60px -28px rgba(231, 107, 138, 0.55);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: "Plus Jakarta Sans", -apple-system, "Hiragino Kaku Gothic ProN",
        "Yu Gothic UI", "Noto Sans SC", sans-serif;
      color: var(--ink);
      background: var(--bg);
      background-image:
        radial-gradient(circle at 12% 8%, #ffd9e1 0%, transparent 40%),
        radial-gradient(circle at 88% 6%, #ffe1ea 0%, transparent 38%),
        radial-gradient(circle at 50% 100%, #ffe4ec 0%, transparent 50%);
      background-attachment: fixed;
      min-height: 100vh;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }

    .zh { font-family: "Noto Sans SC", "Plus Jakarta Sans", sans-serif; }

    /* Decorative floating petals */
    .petal {
      position: fixed;
      pointer-events: none;
      opacity: 0.55;
      animation: float 14s ease-in-out infinite;
      z-index: 0;
    }
    .petal:nth-child(1) { top: 8%; left: 6%; font-size: 22px; animation-delay: 0s; }
    .petal:nth-child(2) { top: 22%; right: 8%; font-size: 18px; animation-delay: -3s; }
    .petal:nth-child(3) { bottom: 18%; left: 10%; font-size: 24px; animation-delay: -6s; }
    .petal:nth-child(4) { bottom: 28%; right: 6%; font-size: 16px; animation-delay: -9s; }
    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0); }
      50% { transform: translateY(-20px) rotate(15deg); }
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 760px;
      margin: 0 auto;
      padding: 48px 24px 96px;
    }

    /* ---- Header ---- */
    .header {
      text-align: center;
      margin-bottom: 32px;
    }

    .header-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--pink-deep);
      background: var(--white);
      padding: 7px 14px;
      border-radius: 999px;
      box-shadow: var(--shadow);
      margin-bottom: 18px;
    }
    .header-eyebrow::before { content: "✿"; font-size: 13px; }
    .header-eyebrow::after { content: "✿"; font-size: 13px; }

    .header h1 {
      font-family: "Fraunces", serif;
      font-weight: 600;
      font-size: clamp(34px, 6vw, 52px);
      line-height: 1.1;
      letter-spacing: -0.02em;
    }
    .header h1 .accent {
      color: var(--pink-deep);
      font-style: italic;
      font-weight: 500;
    }
    .header h1 .zh-title {
      display: block;
      font-family: "Noto Sans SC", serif;
      font-weight: 500;
      font-size: 0.6em;
      color: var(--pink);
      margin-top: 6px;
      letter-spacing: 0.04em;
    }
    .header p {
      margin-top: 16px;
      font-size: 14px;
      color: var(--ink-soft);
    }

    /* ---- Stats bar ---- */
    .stats {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 24px;
    }
    .stat-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--white);
      padding: 10px 16px;
      border-radius: 999px;
      box-shadow: var(--shadow);
      font-size: 13px;
      color: var(--ink-soft);
    }
    .stat-pill .icon { font-size: 15px; }
    .stat-pill .value {
      font-family: "JetBrains Mono", monospace;
      font-weight: 600;
      color: var(--pink-darker);
      font-size: 14px;
    }
    .stat-pill .goal-met { color: var(--green); }

    /* ---- Settings ---- */
    .settings {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }
    .level-btn {
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      padding: 8px 16px;
      border: 1.5px solid var(--line);
      background: var(--white);
      color: var(--ink-soft);
      border-radius: 999px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .level-btn:hover {
      border-color: var(--pink);
      color: var(--pink-deep);
    }
    .level-btn.active {
      background: var(--pink);
      color: var(--white);
      border-color: var(--pink);
    }

    /* ---- Main card ---- */
    .card {
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: 36px 32px;
      box-shadow: var(--shadow-lg);
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: "";
      position: absolute;
      top: -60px;
      right: -60px;
      width: 160px;
      height: 160px;
      background: radial-gradient(circle, #ffd6dd 0%, transparent 70%);
      border-radius: 50%;
      opacity: 0.55;
      pointer-events: none;
    }
    .card::after {
      content: "";
      position: absolute;
      bottom: -50px;
      left: -50px;
      width: 130px;
      height: 130px;
      background: radial-gradient(circle, #ffe4ec 0%, transparent 70%);
      border-radius: 50%;
      opacity: 0.5;
      pointer-events: none;
    }

    .card-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      position: relative;
      z-index: 1;
    }
    .hsk-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--white);
      background: linear-gradient(135deg, var(--pink), var(--pink-deep));
      padding: 6px 12px;
      border-radius: 999px;
    }
    .hsk-badge::before { content: "🌸"; font-size: 12px; }
    .fav-btn {
      background: transparent;
      border: none;
      cursor: pointer;
      font-size: 22px;
      transition: transform 0.2s ease;
      filter: grayscale(0.8);
      opacity: 0.5;
    }
    .fav-btn:hover { transform: scale(1.15); }
    .fav-btn.active {
      filter: none;
      opacity: 1;
      animation: pop 0.3s ease;
    }
    @keyframes pop {
      0% { transform: scale(1); }
      50% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }

    .question-label {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--ink-mute);
      margin-bottom: 10px;
    }
    .question-ja {
      font-family: "Fraunces", "Hiragino Kaku Gothic ProN", serif;
      font-weight: 500;
      font-size: clamp(22px, 4vw, 28px);
      line-height: 1.5;
      color: var(--ink);
      margin-bottom: 28px;
      position: relative;
      z-index: 1;
    }

    .input-wrap {
      position: relative;
      z-index: 1;
    }
    .answer-input {
      width: 100%;
      font-family: "Noto Sans SC", sans-serif;
      font-size: 20px;
      padding: 18px 20px;
      border: 2px solid var(--line);
      border-radius: 18px;
      background: var(--cream);
      color: var(--ink);
      resize: vertical;
      min-height: 80px;
      transition: border-color 0.2s ease, background 0.2s ease;
    }
    .answer-input::placeholder {
      color: var(--ink-mute);
      font-family: inherit;
      font-size: 15px;
    }
    .answer-input:focus {
      outline: none;
      border-color: var(--pink);
      background: var(--white);
    }
    .answer-input:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .actions {
      display: flex;
      gap: 12px;
      margin-top: 18px;
      flex-wrap: wrap;
      position: relative;
      z-index: 1;
    }
    .btn {
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      padding: 12px 22px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--pink), var(--pink-deep));
      color: var(--white);
      box-shadow: 0 8px 20px -8px rgba(231, 107, 138, 0.6);
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 24px -8px rgba(231, 107, 138, 0.7);
    }
    .btn-primary:disabled {
      background: var(--ink-mute);
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    .btn-ghost {
      background: var(--white);
      color: var(--ink-soft);
      border: 1.5px solid var(--line);
    }
    .btn-ghost:hover {
      border-color: var(--pink);
      color: var(--pink-deep);
    }
    .btn-next {
      background: linear-gradient(135deg, var(--pink-deep), var(--pink-darker));
      color: var(--white);
      box-shadow: 0 8px 20px -8px rgba(200, 77, 110, 0.6);
    }
    .btn-next:hover {
      transform: translateY(-2px);
    }

    /* ---- Hint ---- */
    .hint {
      margin-top: 14px;
      padding: 12px 16px;
      background: var(--yellow-soft);
      border-radius: 14px;
      font-size: 14px;
      color: #8a6a26;
      position: relative;
      z-index: 1;
    }
    .hint::before {
      content: "💡 ";
    }

    /* ---- Result ---- */
    .result {
      margin-top: 28px;
      position: relative;
      z-index: 1;
      animation: fadeUp 0.4s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .verdict {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 18px;
      border-radius: 16px;
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 20px;
    }
    .verdict-correct {
      background: var(--green-soft);
      color: #2f7c5e;
    }
    .verdict-partial {
      background: var(--yellow-soft);
      color: #8a6a26;
    }
    .verdict-wrong {
      background: var(--red-soft);
      color: #a23838;
    }
    .verdict .emoji { font-size: 22px; }

    .answer-block {
      background: var(--bg-soft);
      border-radius: 18px;
      padding: 20px 22px;
      margin-bottom: 18px;
    }
    .answer-block .label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.18em;
      color: var(--pink-deep);
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .answer-zh {
      font-family: "Noto Sans SC", sans-serif;
      font-size: 26px;
      font-weight: 500;
      color: var(--ink);
      line-height: 1.4;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .answer-pinyin {
      font-style: italic;
      color: var(--pink-darker);
      font-size: 15px;
      margin-top: 6px;
      font-family: "Plus Jakarta Sans", serif;
    }
    .speak-btn {
      background: var(--white);
      border: 1.5px solid var(--line);
      width: 38px;
      height: 38px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }
    .speak-btn:hover {
      background: var(--pink);
      color: var(--white);
      border-color: var(--pink);
      transform: scale(1.08);
    }
    .your-answer {
      font-family: "Noto Sans SC", sans-serif;
      font-size: 18px;
      color: var(--ink-soft);
      margin-top: 4px;
    }

    /* ---- Words ---- */
    .section-title {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--pink-deep);
      text-transform: uppercase;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .section-title::before {
      content: "";
      width: 6px;
      height: 6px;
      background: var(--pink);
      border-radius: 50%;
    }

    .words-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 10px;
      margin-bottom: 22px;
    }
    .word-item {
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px 14px;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .word-item:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 16px -8px rgba(231, 107, 138, 0.3);
    }
    .word-zh {
      font-family: "Noto Sans SC", sans-serif;
      font-size: 20px;
      font-weight: 600;
      color: var(--ink);
    }
    .word-pinyin {
      font-style: italic;
      color: var(--pink-darker);
      font-size: 13px;
      margin-top: 2px;
    }
    .word-ja {
      font-size: 13px;
      color: var(--ink-soft);
      margin-top: 4px;
      line-height: 1.45;
    }

    /* ---- Grammar ---- */
    .grammar-block {
      background: linear-gradient(135deg, #fff5f7 0%, #fff 100%);
      border: 1px solid var(--line);
      border-left: 4px solid var(--pink);
      border-radius: 14px;
      padding: 16px 18px;
      font-size: 14px;
      line-height: 1.75;
      color: var(--ink);
    }
    .grammar-block strong {
      color: var(--pink-darker);
      font-weight: 700;
    }
    .grammar-block code {
      font-family: "Noto Sans SC", "JetBrains Mono", monospace;
      background: var(--bg-soft);
      padding: 1px 6px;
      border-radius: 4px;
      color: var(--pink-darker);
      font-size: 0.95em;
    }

    .next-wrap {
      margin-top: 22px;
      display: flex;
      justify-content: center;
    }

    /* ---- Footer ---- */
    .footer {
      margin-top: 56px;
      text-align: center;
      font-size: 12px;
      color: var(--ink-mute);
    }
    .footer .heart { color: var(--pink-deep); }

    /* Char diff highlight */
    .diff-correct { color: var(--green); font-weight: 600; }
    .diff-wrong { color: var(--red); text-decoration: line-through; }
    .diff-missing { color: var(--pink-darker); font-weight: 600; background: var(--bg-soft); padding: 0 4px; border-radius: 3px; }

    /* ---- Mobile ---- */
    @media (max-width: 640px) {
      .container { padding: 28px 16px 64px; }
      .card { padding: 26px 22px; border-radius: 22px; }
      .question-ja { font-size: 20px; }
      .answer-zh { font-size: 22px; }
      .answer-input { font-size: 18px; }
      .stat-pill { padding: 8px 12px; font-size: 12px; }
      .btn { padding: 10px 18px; font-size: 13px; }
    }
  </style>
</head>
<body>
  <span class="petal">🌸</span>
  <span class="petal">🌷</span>
  <span class="petal">💗</span>
  <span class="petal">🌸</span>

  <div class="container">
    <header class="header">
      <span class="header-eyebrow">Chinese Output Trainer</span>
      <h1>
        Daily <span class="accent">中国語</span> Talk
        <span class="zh-title">你好！每天一句中文输出</span>
      </h1>
      <p>HSK 1〜4級の日本語文を中国語にしてみよう。毎日少しずつ、続けることが一番。</p>

      <div class="stats">
        <span class="stat-pill"><span class="icon">🔥</span>連続 <span class="value" id="streak">0</span> 日</span>
        <span class="stat-pill"><span class="icon">🌸</span>今日 <span class="value" id="today-count">0</span> / 10</span>
        <span class="stat-pill"><span class="icon">📚</span>累計 <span class="value" id="total">0</span> 文</span>
      </div>
    </header>

    <div class="settings">
      <button class="level-btn active" data-level="all">ALL</button>
      <button class="level-btn" data-level="1">HSK 1</button>
      <button class="level-btn" data-level="2">HSK 2</button>
      <button class="level-btn" data-level="3">HSK 3</button>
      <button class="level-btn" data-level="4">HSK 4</button>
      <button class="level-btn" data-level="fav">⭐ お気に入り</button>
    </div>

    <main class="card">
      <div class="card-head">
        <span class="hsk-badge" id="hsk-badge">HSK 1</span>
        <button class="fav-btn" id="fav-btn" title="お気に入り">☆</button>
      </div>

      <div class="question-label">Translate to Chinese</div>
      <div class="question-ja" id="question-ja">読み込み中…</div>

      <div class="input-wrap">
        <textarea
          class="answer-input zh"
          id="answer-input"
          placeholder="ここに中国語で入力（例：我是学生）"
          autocomplete="off"
          spellcheck="false"
        ></textarea>
      </div>

      <div class="actions">
        <button class="btn btn-primary" id="check-btn">✿ 答え合わせ</button>
        <button class="btn btn-ghost" id="hint-btn">💡 ヒント</button>
        <button class="btn btn-ghost" id="skip-btn">⤴ スキップ</button>
      </div>

      <div id="hint-area"></div>
      <div id="result-area"></div>
    </main>

    <footer class="footer">
      <p>加油！<span class="heart">♡</span> 一天一句、慢慢学</p>
    </footer>
  </div>

  <script>
    // ---- Sentence Dataset (HSK 1〜4) ----
    const SENTENCES = [
      // ===== HSK 1 =====
      {
        ja: "こんにちは。", zh: "你好。", pinyin: "nǐ hǎo.", hsk: 1,
        words: [
          { zh: "你", py: "nǐ", ja: "あなた" },
          { zh: "好", py: "hǎo", ja: "良い／よろしい" }
        ],
        grammar: "中国語で最も基本的なあいさつ。<code>你好</code>は直訳すると「あなた・良い」で、相手の調子の良さを願う言葉。丁寧に言うときは <code>您好（nín hǎo）</code>。"
      },
      {
        ja: "ありがとう。", zh: "谢谢你。", pinyin: "xièxie nǐ.", hsk: 1,
        words: [
          { zh: "谢谢", py: "xièxie", ja: "ありがとう（動詞の重ね）" },
          { zh: "你", py: "nǐ", ja: "あなた" }
        ],
        grammar: "<code>谢谢</code>だけでもOK。動詞の重ね型で柔らかく感謝を表す。返事は <code>不客气（bú kèqi）</code> または <code>不用谢</code>。",
        alts: ["谢谢"]
      },
      {
        ja: "私は学生です。", zh: "我是学生。", pinyin: "wǒ shì xuéshēng.", hsk: 1,
        words: [
          { zh: "我", py: "wǒ", ja: "私" },
          { zh: "是", py: "shì", ja: "〜である（コピュラ）" },
          { zh: "学生", py: "xuéshēng", ja: "学生" }
        ],
        grammar: "<strong>「主語＋是＋名詞」</strong>の基本構文。<code>是</code>は英語のbe動詞に近く、名詞をつなぐ。否定は <code>不是</code>、疑問は文末に <code>吗？</code> を付けて <code>你是学生吗？</code>。"
      },
      {
        ja: "お名前は何ですか？", zh: "你叫什么名字？", pinyin: "nǐ jiào shénme míngzi?", hsk: 1,
        words: [
          { zh: "你", py: "nǐ", ja: "あなた" },
          { zh: "叫", py: "jiào", ja: "（〜と）呼ぶ・名乗る" },
          { zh: "什么", py: "shénme", ja: "何" },
          { zh: "名字", py: "míngzi", ja: "名前" }
        ],
        grammar: "疑問詞 <code>什么</code>（なに）を使った疑問文。中国語の疑問詞疑問文では、英語のように語順を変えず、聞きたい場所にそのまま <code>什么</code> を置く。文末の <code>吗</code> は不要。"
      },
      {
        ja: "今日は天気がいいです。", zh: "今天天气很好。", pinyin: "jīntiān tiānqì hěn hǎo.", hsk: 1,
        words: [
          { zh: "今天", py: "jīntiān", ja: "今日" },
          { zh: "天气", py: "tiānqì", ja: "天気" },

    // ---- State ----
    const STORAGE_KEY = "cn-practice-v1";
    const defaultState = {
      streak: 0,

      todayCount: 0,

      level: "all",
      favorites: [],

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return { ...defaultState };
        return { ...defaultState, ...JSON.parse(raw) };

        return { ...defaultState };
      }
    }
    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    const state = loadState();

    // ---- Streak reset / day change ----
    function todayStr() {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
    }
    function yesterdayStr() {
      const d = new Date();
      d.setDate(d.getDate() - 1);
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
    }

    function rollDayIfNeeded() {
      const today = todayStr();
      if (state.lastDate !== today) {
        // If last activity was yesterday, streak continues but todayCount resets
        // If last activity was older, streak is reset
        if (state.lastDate && state.lastDate !== yesterdayStr() && state.todayCount > 0 === false) {
          // streak broken only when we open a new day after missing
        }
        state.todayCount = 0;
        // Note: streak updates when user completes the first sentence of the day
      }
    }
    rollDayIfNeeded();

    let currentItem = null;

    // ---- Filter & pick ----
    function getPool() {
      if (state.level === "all") return SENTENCES.map((s, i) => ({ s, i }));
      if (state.level === "fav") {
        return SENTENCES
          .map((s, i) => ({ s, i }))
          .filter(({ i }) => state.favorites.includes(i));

      const lv = Number(state.level);
      return SENTENCES.map((s, i) => ({ s, i })).filter(({ s }) => s.hsk === lv);
    }

    function pickNext() {
      const pool = getPool();
      if (pool.length === 0) {
        currentItem = null;
        currentIdx = -1;
        elQuestion.textContent = state.level === "fav"
          ? "お気に入りの文がまだありません。⭐を押して登録してね。"

        elInput.disabled = true;
        elCheckBtn.disabled = true;

        return;
      }
      elHskBadge.style.visibility = "visible";

      elCheckBtn.disabled = false;

      // Prefer items not recently seen
      const unseen = pool.filter(({ i }) => !state.seenIds.includes(i));
      const pickFrom = unseen.length > 0 ? unseen : pool;
      const idx = Math.floor(Math.random() * pickFrom.length);
      const picked = pickFrom[idx];

      state.seenIds.push(picked.i);
      if (state.seenIds.length > Math.max(20, Math.floor(SENTENCES.length * 0.6))) {

    // ---- Hint ----
    function showHint() {
      if (!currentItem) return;
      const first = currentItem.zh.charAt(0);
      const pyFirst = (currentItem.words[0] && currentItem.words[0].py) || "";

    // ---- Normalize & compare ----
    function normalize(s) {
      return (s || "")
        .replace(/[\s　]/g, "")
        .replace(/[，。．、！？!?,.;:；：]/g, "")
        .trim();
    }

    function compareAnswer(user, correct) {
      const u = normalize(user);
      const c = normalize(correct);
      if (u === c) return { verdict: "correct" };
      if (u.length === 0) return { verdict: "wrong", diff: "（未入力）" };

      // Simple char-level LCS for diff highlighting
      const m = u.length, n = c.length;
      const dp = Array.from({ length: m + 1 }, () => new Array(n + 1).fill(0));
      for (let i = 1; i <= m; i++) {
        for (let j = 1; j <= n; j++) {
          if (u[i - 1] === c[j - 1]) dp[i][j] = dp[i - 1][j - 1] + 1;
          else dp[i][j] = Math.max(dp[i - 1][j], dp[i][j - 1]);
        }
      }
      const lcs = dp[m][n];
      const similarity = (2 * lcs) / (m + n);

      // Build diff against correct, marking missing chars
      let i = m, j = n;
      const ops = [];
      while (i > 0 && j > 0) {
        if (u[i - 1] === c[j - 1]) { ops.push({ type: "ok", ch: c[j - 1] }); i--; j--; }
        else if (dp[i - 1][j] >= dp[i][j - 1]) { ops.push({ type: "extra", ch: u[i - 1] }); i--; }
        else { ops.push({ type: "miss", ch: c[j - 1] }); j--; }
      }
      while (i > 0) { ops.push({ type: "extra", ch: u[i - 1] }); i--; }
      while (j > 0) { ops.push({ type: "miss", ch: c[j - 1] }); j--; }
      ops.reverse();
      const diff = ops.map(op => {
        if (op.type === "ok") return `<span class="diff-correct">${op.ch}</span>`;
        if (op.type === "miss") return `<span class="diff-missing">${op.ch}</span>`;
        return `<span class="diff-wrong">${op.ch}</span>`;
      }).join("");

      return {
        verdict: similarity > 0.7 ? "partial" : "wrong",
        diff,
        similarity
      };
    }

    function checkAlternatives(user) {
      const u = normalize(user);
      if (normalize(currentItem.zh) === u) return true;
      if (currentItem.alts) {
        return currentItem.alts.some(a => normalize(a) === u);
      }
      return false;
    }

    // ---- Result ----
    function renderResult(user) {
      const cmp = compareAnswer(user, currentItem.zh);
      const isCorrect = checkAlternatives(user) || cmp.verdict === "correct";

      let verdictHTML;

        verdictHTML = `<div class="verdict verdict-wrong"><span class="emoji">💭</span>模範解答を見てみよう</div>`;

      const wordsHTML = currentItem.words.map(w => `
        <div class="word-item">

      const yourAnswerHTML = (user && !isCorrect)
        ? `<div class="your-answer"><span style="color:var(--ink-mute);font-size:12px;">あなたの答え：</span><br>${cmp.diff || user}</div>`
        : "";

      elResult.innerHTML = `
        <div class="result">
          ${verdictHTML}

            <div class="answer-zh zh">
              <span>${currentItem.zh}</span>

        </div>
      `;

      // Bind buttons inside result
      $("#speak-btn").addEventListener("click", () => speak(currentItem.zh));
      $("#next-btn").addEventListener("click", pickNext);

      // Update stats only once per question
      if (!checked) {
        const today = todayStr();
        if (state.lastDate === today) {

          if (state.lastDate === yesterdayStr()) {

          state.lastDate = today;
          state.todayCount = 1;

        state.total += 1;

      checked = true;
      elCheckBtn.disabled = true;
      elInput.disabled = true;

      setTimeout(() => speak(currentItem.zh), 350);

    // ---- TTS voice handling ----
    let zhVoice = null;
    function pickZhVoice() {
      if (!window.speechSynthesis) return;
      const voices = window.speechSynthesis.getVoices();
      if (!voices || voices.length === 0) return;
      const preferredNames = [
        "Tingting", "Ting-Ting", "Sin-ji", "Mei-Jia",
        "Microsoft Xiaoxiao", "Microsoft Yaoyao", "Microsoft Huihui",
        "Google 普通话（中国大陆）", "Google 中文（中国大陆）"
      ];
      // 1) Exact lang match zh-CN with preferred name
      zhVoice =
        voices.find(v => /^zh[-_]CN/i.test(v.lang) && preferredNames.some(n => v.name.includes(n))) ||
        voices.find(v => /^zh[-_]CN/i.test(v.lang)) ||
        voices.find(v => /^cmn[-_]?/i.test(v.lang)) ||
        voices.find(v => /^zh/i.test(v.lang)) ||
        null;
    }
    if (window.speechSynthesis) {
      pickZhVoice();
      window.speechSynthesis.addEventListener("voiceschanged", pickZhVoice);
    }

    function speak(text) {
      try {
        const synth = window.speechSynthesis;
        if (!synth) return;
        synth.cancel();
        if (!zhVoice) pickZhVoice();
        const u = new SpeechSynthesisUtterance(text);
        if (zhVoice) {
          u.voice = zhVoice;
          u.lang = zhVoice.lang;
        } else {
          u.lang = "zh-CN";
        }
        u.rate = 0.85;
        u.pitch = 1;
        synth.speak(u);
      } catch (e) {
        // No-op
      }
    }

    // ---- Favorites ----
    function updateFavButton() {
      if (currentIdx === -1) return;
      const on = state.favorites.includes(currentIdx);
      elFavBtn.classList.toggle("active", on);
      elFavBtn.textContent = on ? "⭐" : "☆";
    }
    elFavBtn.addEventListener("click", () => {
      if (currentIdx === -1) return;
      const idx = state.favorites.indexOf(currentIdx);
      if (idx >= 0) state.favorites.splice(idx, 1);
      else state.favorites.push(currentIdx);
      saveState();
      updateFavButton();
    });

    // ---- Stats ----
    function renderStats() {
      elStreak.textContent = state.streak;
      elTodayCount.textContent = state.todayCount;
      elTotal.textContent = state.total;
      const todayPill = elTodayCount.parentElement;
      if (state.todayCount >= 10) {
        elTodayCount.classList.add("goal-met");
      } else {
        elTodayCount.classList.remove("goal-met");
      }
    }
    renderStats();

    // ---- Level switch ----
    function setLevel(lv) {
      state.level = lv;
      levelBtns.forEach(b => b.classList.toggle("active", b.dataset.level === lv));
      saveState();
      pickNext();
    }
    levelBtns.forEach(btn => {
      btn.classList.toggle("active", btn.dataset.level === state.level);
      btn.addEventListener("click", () => setLevel(btn.dataset.level));
    });

    // ---- Event ----
    elCheckBtn.addEventListener("click", () => {
      if (!currentItem || checked) return;
      renderResult(elInput.value);
    });
    elHintBtn.addEventListener("click", showHint);
    elSkipBtn.addEventListener("click", pickNext);
    elInput.addEventListener("keydown", (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === "Enter") {
        e.preventDefault();
        elCheckBtn.click();
      }
    });

    // ---- Start ----
    pickNext();
  </script>
</body>
</html>
