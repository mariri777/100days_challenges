<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>今日の七十二候 — 一年を七十二の季節に</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    /* 既定（夏） */
    --bg: #eef2f1;
    --bg2: #e3ebe9;
    --ink: #34403f;
    --sub: #6f7e7c;
    --accent: #5b8a86;
    --line: rgba(52,64,63,0.14);
    --card: rgba(255,255,255,0.55);
  }
  /* 季節ごとのニュアンスカラー */
  body.spring {
    --bg: #f7eef0; --bg2: #efe2e6; --ink: #4a3b42; --sub: #8a7480;
    --accent: #b97a86; --line: rgba(74,59,66,0.13); --card: rgba(255,255,255,0.5);
  }
  body.summer {
    --bg: #eef2f1; --bg2: #e2ebe9; --ink: #34403f; --sub: #6f7e7c;
    --accent: #5b8a86; --line: rgba(52,64,63,0.14); --card: rgba(255,255,255,0.55);
  }
  body.autumn {
    --bg: #f4ede2; --bg2: #ece0cf; --ink: #463a30; --sub: #8a7458;
    --accent: #b3704a; --line: rgba(70,58,48,0.13); --card: rgba(255,255,255,0.46);
  }
  body.winter {
    --bg: #eef0f3; --bg2: #e2e6ec; --ink: #3a3f47; --sub: #757d88;
    --accent: #6b7480; --line: rgba(58,63,71,0.13); --card: rgba(255,255,255,0.5);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: "Shippori Mincho B1", serif;
    color: var(--ink);
    background:
      radial-gradient(120% 90% at 50% -10%, var(--bg2), transparent 60%),
      var(--bg);
    transition: background 1.2s ease, color 1.2s ease;
    min-height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: clamp(28px, 6vw, 72px) 20px;
    line-height: 1.8;
    -webkit-font-smoothing: antialiased;
  }

  /* ── ヘッダ ── */
  header { text-align: center; margin-bottom: clamp(28px, 5vw, 48px); }
  .brand {
    font-size: 13px; letter-spacing: 0.5em; color: var(--sub);
    font-weight: 500; padding-left: 0.5em;
  }
  .brand-en {
    font-size: 10px; letter-spacing: 0.34em; color: var(--sub);
    opacity: 0.7; margin-top: 8px; font-weight: 400;
  }

  /* ── 中央カード ── */
  .stage {
    width: min(680px, 100%);
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 4px;
    backdrop-filter: blur(6px);
    padding: clamp(30px, 5vw, 44px) clamp(24px, 5vw, 56px);
    box-shadow: 0 24px 60px -40px rgba(0,0,0,0.4);
    text-align: center;
    position: relative;
  }

  .season-row {
    display: flex; align-items: center; justify-content: center;
    gap: 14px; color: var(--sub); font-size: 14px; letter-spacing: 0.18em;
    margin-bottom: 6px;
  }
  .season-row .dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--accent); display: inline-block;
  }
  .sekki {
    font-size: clamp(15px, 3.6vw, 18px); color: var(--accent);
    letter-spacing: 0.28em; font-weight: 600; margin-bottom: 2px;
    padding-left: 0.28em;
  }
  .position {
    font-size: 12px; color: var(--sub); letter-spacing: 0.3em;
    padding-left: 0.3em;
  }

  /* 候の名前（縦書き） */
  .ko-name {
    writing-mode: vertical-rl;
    text-orientation: upright;
    font-weight: 800;
    font-size: clamp(38px, 9vw, 58px);
    letter-spacing: 0.1em;
    line-height: 1.08;
    margin: clamp(18px, 3vw, 26px) auto clamp(14px, 2.4vw, 20px);
    height: auto;
    color: var(--ink);
  }
  .reading {
    font-size: clamp(15px, 3.8vw, 19px);
    color: var(--accent);
    letter-spacing: 0.16em;
    margin-bottom: clamp(18px, 3vw, 26px);
    font-weight: 500;
  }
  .desc {
    font-size: clamp(15px, 3.6vw, 17px);
    color: var(--ink);
    max-width: 30em;
    margin: 0 auto clamp(20px, 3.5vw, 28px);
    line-height: 2.1;
  }
  .range {
    display: inline-block;
    font-size: 13px; letter-spacing: 0.16em; color: var(--sub);
    border-top: 1px solid var(--line);
    padding-top: 16px;
  }
  .range .no { opacity: 0.75; margin-left: 0.5em; }

  /* ── 三候のステップ ── */
  .steps {
    display: flex; justify-content: center; gap: 0;
    margin-top: clamp(22px, 4vw, 30px);
  }
  .step {
    flex: 1; max-width: 150px; text-align: center;
    padding: 12px 6px; cursor: pointer;
    border: none; border-top: 2px solid var(--line);
    color: var(--sub); font-size: 12px; letter-spacing: 0.08em;
    transition: color 0.4s ease, border-color 0.4s ease;
    background: none; font-family: inherit; line-height: 1.7;
  }
  .step .lab { display: block; font-size: 10px; letter-spacing: 0.3em; opacity: 0.7; margin-bottom: 4px; }
  .step.on { color: var(--accent); border-top-color: var(--accent); font-weight: 600; }
  .step:hover { color: var(--ink); }

  /* ── 操作 ── */
  .controls {
    display: flex; align-items: center; justify-content: center;
    gap: 18px; margin-top: clamp(26px, 5vw, 38px); flex-wrap: wrap;
  }
  .nav {
    font-family: inherit; font-size: 14px; letter-spacing: 0.16em;
    color: var(--ink); background: transparent;
    border: 1px solid var(--line); border-radius: 999px;
    padding: 10px 22px; cursor: pointer;
    transition: border-color 0.4s ease, color 0.4s ease, background 0.4s ease;
  }
  .nav:hover { border-color: var(--accent); color: var(--accent); }
  .today-btn {
    font-family: inherit; font-size: 13px; letter-spacing: 0.18em;
    color: var(--sub); background: transparent; border: none;
    cursor: pointer; padding: 6px; border-bottom: 1px solid transparent;
  }
  .today-btn:hover { color: var(--accent); border-bottom-color: var(--accent); }

  .pickwrap {
    margin-top: 22px; display: flex; flex-direction: column; align-items: center; gap: 6px;
  }
  .pickwrap label { font-size: 11px; letter-spacing: 0.24em; color: var(--sub); }
  input[type="date"] {
    font-family: inherit; font-size: 14px; color: var(--ink);
    background: var(--card); border: 1px solid var(--line);
    border-radius: 3px; padding: 8px 12px; letter-spacing: 0.06em;
  }

  footer {
    margin-top: clamp(36px, 6vw, 60px);
    font-size: 11px; letter-spacing: 0.3em; color: var(--sub);
    opacity: 0.7; text-align: center;
  }
  footer a { color: inherit; }

  /* ふわっと切り替え */
  .fade { animation: fade 0.7s ease; }
  @keyframes fade {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 640px) {
    body { padding: 24px 14px 40px; }
    .stage { padding: 30px 20px; }
    .steps { gap: 0; }
    .step { font-size: 11px; }
    .controls { gap: 12px; }
    .nav { padding: 9px 18px; }
  }
</style>
</head>

  const SEASON_CLASS = { "春":"spring", "夏":"summer", "秋":"autumn", "冬":"winter" };
  const POS = ["初候", "次候", "末候"];
  const KAN = ["零","一","二","三","四","五","六","七","八","九","十"];

  // 1〜72 を漢数字に（第〇〇候）
  function kanNum(num) {
    if (num <= 10) return KAN[num];
    if (num < 20) return "十" + (num % 10 === 0 ? "" : KAN[num % 10]);
    const t = Math.floor(num / 10), o = num % 10;
    return KAN[t] + "十" + (o === 0 ? "" : KAN[o]);
  }

  // 日付(月,日)からその日が属する候の番号(0始まり)を返す
  function indexForDate(month, day) {
    const val = month * 100 + day;
    let best = 65; // 1/1始まりの「雪下出麦」を既定に
    let bestVal = -1;
    for (let i = 0; i < KO.length; i++) {
      const v = KO[i].m * 100 + KO[i].dy;
      if (v <= val && v > bestVal) { best = i; bestVal = v; }
    }
    return best;
  }

  // その候の終了日（次の候の前日）を「○月○日」で
  function endLabel(i) {
    const next = KO[(i + 1) % KO.length];
    // 2025年(平年)を基準に前日を計算
    const d = new Date(2025, next.m - 1, next.dy);
    d.setDate(d.getDate() - 1);
    return (d.getMonth() + 1) + "月" + d.getDate() + "日";
  }

  let current = 0;

  function render(i, animate = true) {
    current = (i + KO.length) % KO.length;
    const k = KO[current];
    const season = SEASON_OF(current);

    document.body.className = SEASON_CLASS[season];

    document.getElementById("season").textContent = season;
    document.getElementById("sekki").textContent = k.s;
    document.getElementById("position").textContent = POS[current % 3];

    const name = document.getElementById("koName");
    const reading = document.getElementById("reading");
    const desc = document.getElementById("desc");
    name.textContent = k.n;
    reading.textContent = k.y;
    desc.textContent = k.d;

    document.getElementById("range").innerHTML =
      k.m + "月" + k.dy + "日 〜 " + endLabel(current) +
      '<span class="no">第' + kanNum(current + 1) + "候</span>";

    // 三候ステップ（この節気の初候・次候・末候）
    const base = current - (current % 3);
    const steps = document.getElementById("steps");
    steps.innerHTML = "";
    for (let p = 0; p < 3; p++) {
      const idx = base + p;
      const btn = document.createElement("button");
      btn.className = "step" + (idx === current ? " on" : "");
      btn.innerHTML = '<span class="lab">' + POS[p] + "</span>" + KO[idx].n;
      btn.addEventListener("click", () => render(idx));
      steps.appendChild(btn);
    }

    if (animate) {
      [name, reading, desc].forEach(el => {
        el.classList.remove("fade");
        void el.offsetWidth; // リフロー
        el.classList.add("fade");
      });
    }
  }

  // 操作
  document.getElementById("prev").addEventListener("click", () => render(current - 1));
  document.getElementById("next").addEventListener("click", () => render(current + 1));

  const datePick = document.getElementById("datePick");
  datePick.addEventListener("change", () => {
    if (!datePick.value) return;
    const [, mm, dd] = datePick.value.split("-").map(Number);
    render(indexForDate(mm, dd));
  });

  function goToday() {
    const now = new Date();
    const m = now.getMonth() + 1, d = now.getDate();
    datePick.value = now.toISOString().slice(0, 10);
    render(indexForDate(m, d));
  }
  document.getElementById("todayBtn").addEventListener("click", goToday);

  // 初期表示は今日の候
  goToday();
</script>
</body>
</html>
