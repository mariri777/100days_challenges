<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>セール価格電卓 — 二重割引も税込もすぐ計算</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<link rel="apple-touch-icon" href="favicon.svg" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@500;600;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap"
  rel="stylesheet"
/>

<style>
  :root {
    --bg: #f3f1f2;
    --paper: #fffdfe;
    --ink: #2a262a;
    --ink-soft: #675f66;
    --ink-faint: #a79fa5;
    --line: #e6dfe4;
    --line-soft: #f0eaee;
    --accent: #8a6d86;
    --accent-deep: #6d5369;
    --accent-soft: #efe8ee;
    --gold: #b08a3e;
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: "Zen Kaku Gothic New", -apple-system, "Hiragino Kaku Gothic ProN", sans-serif;
    color: var(--ink); background: var(--bg); min-height: 100vh; line-height: 1.8;
    -webkit-font-smoothing: antialiased; letter-spacing: 0.02em;
  }

  .wrap { max-width: 580px; margin: 0 auto; padding: 28px 20px 90px; }

  .home-link {
    display: inline-flex; align-items: center; gap: 7px; font-size: 13px; color: var(--ink-soft);
    text-decoration: none; padding: 7px 15px; border: 1px solid var(--line); border-radius: 999px;
    background: var(--paper); transition: border-color .2s ease, color .2s ease;
  }
  .home-link:hover { color: var(--accent-deep); border-color: var(--accent); }

  /* Hero */
  .hero { text-align: center; margin: 42px 0 24px; }
  .eyebrow { font-family: "Shippori Mincho B1", serif; font-size: 12px; letter-spacing: 0.4em; color: var(--accent-deep); font-weight: 600; }
  .hero h1 { font-family: "Shippori Mincho B1", serif; font-weight: 700; font-size: clamp(28px, 7vw, 42px); line-height: 1.32; letter-spacing: 0.08em; margin: 12px 0 0; }
  .hero p { color: var(--ink-soft); font-size: 13.5px; max-width: 380px; margin: 14px auto 0; line-height: 1.95; }

  .panel { background: var(--paper); border: 1px solid var(--line); border-radius: var(--radius); padding: 22px 22px 24px; margin-bottom: 16px; }

  .field { margin-bottom: 18px; }
  .field:last-child { margin-bottom: 0; }
  .field-label { font-family: "Shippori Mincho B1", serif; font-size: 13px; font-weight: 600; color: var(--ink); letter-spacing: 0.08em; margin-bottom: 10px; display: flex; align-items: baseline; gap: 8px; }
  .field-label .opt { font-family: "Zen Kaku Gothic New", sans-serif; font-size: 11px; color: var(--ink-faint); font-weight: 500; }

  .price-input { display: flex; align-items: center; gap: 10px; }
  .price-input .yen { font-family: "Shippori Mincho B1", serif; font-size: 22px; color: var(--ink-soft); }
  input[type="number"] {
    font-family: "Shippori Mincho B1", serif; font-size: 20px; font-weight: 700; color: var(--ink);
    padding: 10px 14px; border: 1px solid var(--line); border-radius: 10px; background: #fff; outline: none;
    transition: border-color .15s ease, box-shadow .15s ease; width: 100%;
  }
  input[type="number"].sm { font-size: 16px; padding: 9px 12px; }
  input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  input::placeholder { color: var(--ink-faint); font-weight: 400; }

  .chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    font-family: "Shippori Mincho B1", serif; font-size: 13px; font-weight: 500;
    padding: 8px 15px; border-radius: 999px; border: 1px solid var(--line);
    background: #fff; color: var(--ink-soft); cursor: pointer; transition: all .15s ease; letter-spacing: 0.04em;
  }
  .chip:hover { border-color: var(--accent); color: var(--accent-deep); }
  .chip.active { border-color: var(--accent); background: var(--accent); color: #fff; }

  .inline-row { display: flex; gap: 12px; flex-wrap: wrap; }
  .inline-row .half { flex: 1; min-width: 130px; }

  .pct-row { display: flex; align-items: center; gap: 10px; }
  .pct-row .pct { font-family: "Shippori Mincho B1", serif; font-size: 18px; color: var(--ink-soft); }

  /* Result */
  .result { text-align: center; padding: 6px 0 2px; }
  .result .r-cap { font-family: "Shippori Mincho B1", serif; font-size: 13px; color: var(--ink-soft); letter-spacing: 0.1em; }
  .result .r-num { font-family: "Shippori Mincho B1", serif; font-size: clamp(44px, 13vw, 66px); font-weight: 700; line-height: 1.1; margin: 4px 0 2px; }
  .result .r-num small { font-size: 20px; color: var(--ink-faint); margin-left: 4px; }
  .result .r-unit { font-size: 12.5px; color: var(--ink-faint); }

  .off-badge { display: inline-flex; align-items: baseline; gap: 4px; margin: 16px auto 4px; background: var(--accent-soft); color: var(--accent-deep); border-radius: 999px; padding: 7px 18px; font-family: "Shippori Mincho B1", serif; font-weight: 700; letter-spacing: 0.04em; }
  .off-badge .big { font-size: 20px; }
  .off-badge .lbl { font-size: 12px; }

  .facts { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
  .fact { text-align: center; padding: 12px 6px; border: 1px solid var(--line); border-radius: 11px; background: var(--bg); }
  .fact .f-lbl { font-size: 11px; color: var(--ink-faint); letter-spacing: 0.06em; }
  .fact .f-num { font-family: "Shippori Mincho B1", serif; font-size: 17px; font-weight: 700; margin-top: 3px; }
  .fact.save .f-num { color: var(--accent-deep); }
  .fact .f-strike { text-decoration: line-through; color: var(--ink-faint); font-size: 15px; }

  .breakdown { margin-top: 18px; font-size: 12.5px; color: var(--ink-soft); text-align: center; line-height: 1.9; background: var(--line-soft); border-radius: 10px; padding: 12px 14px; }
  .breakdown b { color: var(--accent-deep); }

  .actions { margin-top: 18px; text-align: center; }
  .btn { font-family: inherit; font-weight: 700; font-size: 13.5px; color: var(--ink); background: #fff; border: 1px solid var(--line); padding: 10px 20px; border-radius: 10px; cursor: pointer; transition: all .15s ease; letter-spacing: 0.04em; }
  .btn:hover { border-color: var(--accent); color: var(--accent-deep); }

  .toast {
    position: fixed; left: 50%; bottom: 30px; transform: translateX(-50%) translateY(16px);
    background: var(--ink); color: var(--paper); font-size: 13px; padding: 11px 22px; border-radius: 999px;
    letter-spacing: 0.05em; opacity: 0; pointer-events: none; transition: opacity .25s ease, transform .25s ease;
    box-shadow: 0 8px 26px rgba(0,0,0,.22); z-index: 50;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .footer { text-align: center; margin-top: 44px; padding-top: 24px; border-top: 1px solid var(--line); font-family: "Shippori Mincho B1", serif; font-size: 12px; color: var(--ink-faint); line-height: 2.1; letter-spacing: 0.14em; }

  @media (max-width: 640px) {
    .wrap { padding: 22px 15px 74px; }
    .hero { margin: 30px 0 18px; }
    .panel { padding: 20px 16px; }
  }
</style>
</head>
<body>
<div class="wrap">

  <a class="home-link" href="index.html">← 一覧へもどる</a>

  <!-- ============ HERO ============ -->
  <header class="hero">
    <div class="eyebrow">SALE PRICE</div>
    <h1>セール価格電卓</h1>
    <p>定価と割引率を入れるだけ。「二重割引」や税込・端数まで含めた“実際に払う金額”がすぐ分かります。</p>
  </header>

  <!-- ============ RESULT ============ -->
  <section class="panel">
    <div class="result">
      <div class="r-cap">支払う金額</div>
      <div class="r-num"><span id="payTotal">¥0</span></div>
      <div class="r-unit" id="payUnit"></div>
    </div>
    <div style="text-align:center">
      <span class="off-badge"><span class="big" id="offPct">0%</span><span class="lbl">OFF（実質）</span></span>
    </div>
    <div class="facts">
      <div class="fact"><div class="f-lbl">定価</div><div class="f-num f-strike" id="factList">¥0</div></div>
      <div class="fact save"><div class="f-lbl">お得</div><div class="f-num" id="factSave">¥0</div></div>
      <div class="fact"><div class="f-lbl">割引後(税抜)</div><div class="f-num" id="factNet">¥0</div></div>
    </div>
    <div class="breakdown" id="breakdown"></div>
    <div class="actions"><button class="btn" id="btnCopy">結果をコピー</button></div>
  </section>

  <!-- ============ INPUTS ============ -->
  <section class="panel">
    <div class="field">
      <div class="field-label">定価</div>
      <div class="price-input">
        <span class="yen">¥</span>
        <input type="number" id="price" value="3000" min="0" inputmode="numeric" />
      </div>
    </div>

    <div class="field">
      <div class="field-label">割引率</div>
      <div class="chips" id="discChips" style="margin-bottom:10px"></div>
      <div class="pct-row">
        <input type="number" id="discount" class="sm" value="30" min="0" max="100" inputmode="numeric" />
        <span class="pct">% OFF</span>
      </div>
    </div>

    <div class="field">
      <div class="field-label">追加割引 <span class="opt">レジ・クーポンなど / 任意</span></div>
      <div class="pct-row">
        <input type="number" id="extra" class="sm" value="0" min="0" max="100" inputmode="numeric" />
        <span class="pct">% さらに OFF</span>
      </div>
    </div>

    <div class="inline-row">
      <div class="field half">
        <div class="field-label">税</div>
        <div class="chips" id="taxChips"></div>
      </div>
      <div class="field half">
        <div class="field-label">端数</div>
        <div class="chips" id="roundChips"></div>
      </div>
    </div>

    <div class="field">
      <div class="field-label">個数</div>
      <div class="pct-row">
        <input type="number" id="qty" class="sm" value="1" min="1" inputmode="numeric" style="max-width:120px" />
        <span class="pct">個</span>
      </div>
    </div>
  </section>

  <footer class="footer">
    セール価格電卓 ・ サーバー不要<br />
    Built by usami_louis ・ Day 26
  </footer>

</div>

<div class="toast" id="toast"></div>

<script>
  const $ = (id) => document.getElementById(id);
  const yen = (n) => "¥" + Math.round(n).toLocaleString("ja-JP");

  let tax = "none";   // none | t10 | t8
  let rounding = "round"; // round | floor | ceil

  // ===== チップUI =====
  function buildChips(boxId, items, onPick) {
    const box = $(boxId);
    box.innerHTML = "";
    items.forEach((it) => {
      const el = document.createElement("span");
      el.className = "chip" + (it.active ? " active" : "");
      el.textContent = it.label;
      el.dataset.val = it.val;
      el.addEventListener("click", () => onPick(it.val, box, el));
      box.appendChild(el);
    });
  }

  // 割引率チップ
  buildChips("discChips",
    [10, 20, 30, 40, 50, 70].map((v) => ({ label: v + "%", val: v, active: v === 30 })),
    (val) => { $("discount").value = val; syncDiscChips(); render(); }
  );
  function syncDiscChips() {
    const cur = Number($("discount").value);
    [...$("discChips").children].forEach((c) => c.classList.toggle("active", Number(c.dataset.val) === cur));
  }

  // 税チップ
  buildChips("taxChips",
    [{ label: "税抜", val: "none", active: true }, { label: "税込10%", val: "t10" }, { label: "軽減8%", val: "t8" }],
    (val, box, el) => { tax = val; [...box.children].forEach((c) => c.classList.remove("active")); el.classList.add("active"); render(); }
  );

  // 端数チップ
  buildChips("roundChips",
    [{ label: "四捨五入", val: "round", active: true }, { label: "切捨て", val: "floor" }, { label: "切上げ", val: "ceil" }],
    (val, box, el) => { rounding = val; [...box.children].forEach((c) => c.classList.remove("active")); el.classList.add("active"); render(); }
  );

  function roundYen(n) {
    if (rounding === "floor") return Math.floor(n);
    if (rounding === "ceil") return Math.ceil(n);
    return Math.round(n);
  }
  function taxMul() { return tax === "t10" ? 1.1 : tax === "t8" ? 1.08 : 1; }
  function taxLabel() { return tax === "t10" ? "税込(10%)" : tax === "t8" ? "税込(8%)" : "税抜"; }

  function render() {
    const price = Math.max(0, Number($("price").value) || 0);
    let d1 = Math.min(100, Math.max(0, Number($("discount").value) || 0)) / 100;
    let d2 = Math.min(100, Math.max(0, Number($("extra").value) || 0)) / 100;
    const qty = Math.max(1, Math.floor(Number($("qty").value) || 1));
    const mul = taxMul();

    const netPreTax = price * (1 - d1) * (1 - d2);      // 割引後（税抜）1個
    const unitFinal = roundYen(netPreTax * mul);         // 支払 1個
    const listFinal = roundYen(price * mul);             // 定価（同じ税基準）1個
    const totalPay = unitFinal * qty;
    const totalList = listFinal * qty;
    const saved = totalList - totalPay;
    const effRate = price > 0 ? (1 - (1 - d1) * (1 - d2)) * 100 : 0;

    $("payTotal").textContent = yen(totalPay);
    $("payUnit").textContent = qty > 1 ? "1個あたり " + yen(unitFinal) + " ・ " + taxLabel() : taxLabel();
    $("offPct").textContent = (Math.round(effRate * 10) / 10) + "%";
    $("factList").textContent = yen(totalList);
    $("factSave").textContent = yen(saved);
    $("factNet").textContent = yen(roundYen(netPreTax) * qty);

    // 内訳
    let bd = "定価 " + yen(price);
    if (d1 > 0) bd += " → <b>" + Math.round(d1 * 100) + "%OFF</b>";
    if (d2 > 0) bd += " → さらに <b>" + Math.round(d2 * 100) + "%OFF</b>";
    bd += "<br>" + taxLabel() + " ・ " + roundLabel() + (qty > 1 ? " ・ " + qty + "個" : "");
    $("breakdown").innerHTML = bd;
  }
  function roundLabel() { return rounding === "floor" ? "切り捨て" : rounding === "ceil" ? "切り上げ" : "四捨五入"; }

  // ===== コピー =====
  function buildSummary() {
    const price = Math.max(0, Number($("price").value) || 0);
    const d1 = Number($("discount").value) || 0, d2 = Number($("extra").value) || 0;
    const qty = Math.max(1, Math.floor(Number($("qty").value) || 1));
    let s = "【セール価格】\n定価 " + yen(price) + "（" + d1 + "%OFF";
    if (d2 > 0) s += " ＋ さらに" + d2 + "%OFF";
    s += "）\n";
    s += "支払 " + $("payTotal").textContent + "（" + taxLabel() + (qty > 1 ? "・" + qty + "個" : "") + "）\n";
    s += "お得 " + $("factSave").textContent + " ・ 実質 " + $("offPct").textContent + "OFF";
    return s;
  }
  function toast(msg) {
    const t = $("toast");
    t.textContent = msg; t.classList.add("show");
    clearTimeout(toast._t);
    toast._t = setTimeout(() => t.classList.remove("show"), 1600);
  }
  $("btnCopy").addEventListener("click", () => {
    const text = buildSummary();
    const done = () => toast("結果をコピーしました");
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(done).catch(() => fb(text, done));
    } else fb(text, done);
  });
  function fb(text, done) {
    const ta = document.createElement("textarea");
    ta.value = text; ta.style.position = "fixed"; ta.style.opacity = "0";
    document.body.appendChild(ta); ta.select();
    try { document.execCommand("copy"); done(); } catch (e) { toast("コピーできませんでした"); }
    document.body.removeChild(ta);
  }

  // ===== イベント =====
  ["price", "discount", "extra", "qty"].forEach((id) => {
    $(id).addEventListener("input", () => { if (id === "discount") syncDiscChips(); render(); });
  });

  render();
</script>
</body>
</html>
