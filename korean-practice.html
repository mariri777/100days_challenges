<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>안녕！韓国語アウトプット練習</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet"
  />

  <style>
    :root {
      --bg: #fff5f7;
      --bg-soft: #ffe7ee;
      --pink-light: #ffd0dd;
      --pink: #ff8fa9;
      --pink-deep: #e76b8a;
      --pink-darker: #c84d6e;
      --cream: #fffaf9;
      --white: #ffffff;
      --ink: #4a2f3a;
      --ink-soft: #8a6a76;
      --ink-mute: #b69aa3;
      --line: #f3d9d3;
      --green: #6db99e;
      --green-soft: #d8f0e6;
      --red: #e76b6b;
      --red-soft: #fde2e2;
      --yellow: #f5c46b;
      --yellow-soft: #fbecc7;
      --shadow: 0 14px 30px -18px rgba(231, 107, 138, 0.45);
      --shadow-lg: 0 26px 60px -28px rgba(231, 107, 138, 0.55);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: "Plus Jakarta Sans", -apple-system, "Hiragino Kaku Gothic ProN",
        "Yu Gothic UI", "Noto Sans KR", sans-serif;
      color: var(--ink);
      background: var(--bg);
      background-image:
        radial-gradient(circle at 12% 8%, #ffd9e1 0%, transparent 40%),
        radial-gradient(circle at 88% 6%, #ffe1ea 0%, transparent 38%),
        radial-gradient(circle at 50% 100%, #ffe4ec 0%, transparent 50%);
      background-attachment: fixed;
      min-height: 100vh;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }

    .ko { font-family: "Noto Sans KR", "Plus Jakarta Sans", sans-serif; }

    .petal {
      position: fixed;
      pointer-events: none;
      opacity: 0.55;
      animation: float 14s ease-in-out infinite;
      z-index: 0;
    }
    .petal:nth-child(1) { top: 8%; left: 6%; font-size: 22px; animation-delay: 0s; }
    .petal:nth-child(2) { top: 22%; right: 8%; font-size: 18px; animation-delay: -3s; }
    .petal:nth-child(3) { bottom: 18%; left: 10%; font-size: 24px; animation-delay: -6s; }
    .petal:nth-child(4) { bottom: 28%; right: 6%; font-size: 16px; animation-delay: -9s; }
    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0); }
      50% { transform: translateY(-20px) rotate(15deg); }
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 760px;
      margin: 0 auto;
      padding: 48px 24px 96px;
    }

    .header { text-align: center; margin-bottom: 32px; }

    .header-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--pink-deep);
      background: var(--white);
      padding: 7px 14px;
      border-radius: 999px;
      box-shadow: var(--shadow);
      margin-bottom: 18px;
    }
    .header-eyebrow::before { content: "✿"; font-size: 13px; }
    .header-eyebrow::after { content: "✿"; font-size: 13px; }

    .header h1 {
      font-family: "Fraunces", serif;
      font-weight: 600;
      font-size: clamp(34px, 6vw, 52px);
      line-height: 1.1;
      letter-spacing: -0.02em;
    }
    .header h1 .accent {
      color: var(--pink-deep);
      font-style: italic;
      font-weight: 500;
    }
    .header h1 .ko-title {
      display: block;
      font-family: "Noto Sans KR", serif;
      font-weight: 500;
      font-size: 0.55em;
      color: var(--pink);
      margin-top: 6px;
      letter-spacing: 0.02em;
    }
    .header p {
      margin-top: 16px;
      font-size: 14px;
      color: var(--ink-soft);
    }

    .stats {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 24px;
    }
    .stat-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--white);
      padding: 10px 16px;
      border-radius: 999px;
      box-shadow: var(--shadow);
      font-size: 13px;
      color: var(--ink-soft);
    }
    .stat-pill .icon { font-size: 15px; }
    .stat-pill .value {
      font-family: "JetBrains Mono", monospace;
      font-weight: 600;
      color: var(--pink-darker);
      font-size: 14px;
    }
    .stat-pill .goal-met { color: var(--green); }

    .settings {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }
    .level-btn {
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      padding: 8px 16px;
      border: 1.5px solid var(--line);
      background: var(--white);
      color: var(--ink-soft);
      border-radius: 999px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .level-btn:hover {
      border-color: var(--pink);
      color: var(--pink-deep);
    }
    .level-btn.active {
      background: var(--pink);
      color: var(--white);
      border-color: var(--pink);
    }

    .card {
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: 36px 32px;
      box-shadow: var(--shadow-lg);
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: "";
      position: absolute;
      top: -60px;
      right: -60px;
      width: 160px;
      height: 160px;
      background: radial-gradient(circle, #ffd6dd 0%, transparent 70%);
      border-radius: 50%;
      opacity: 0.55;
      pointer-events: none;
    }
    .card::after {
      content: "";
      position: absolute;
      bottom: -50px;
      left: -50px;
      width: 130px;
      height: 130px;
      background: radial-gradient(circle, #ffe4ec 0%, transparent 70%);
      border-radius: 50%;
      opacity: 0.5;
      pointer-events: none;
    }

    .card-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      position: relative;
      z-index: 1;
    }
    .level-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--white);
      background: linear-gradient(135deg, var(--pink), var(--pink-deep));
      padding: 6px 12px;
      border-radius: 999px;
    }
    .level-badge::before { content: "🌷"; font-size: 12px; }
    .fav-btn {
      background: transparent;
      border: none;
      cursor: pointer;
      font-size: 22px;
      transition: transform 0.2s ease;
      filter: grayscale(0.8);
      opacity: 0.5;
    }
    .fav-btn:hover { transform: scale(1.15); }
    .fav-btn.active {
      filter: none;
      opacity: 1;
      animation: pop 0.3s ease;
    }
    @keyframes pop {
      0% { transform: scale(1); }
      50% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }

    .question-label {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--ink-mute);
      margin-bottom: 10px;
    }
    .question-ja {
      font-family: "Fraunces", "Hiragino Kaku Gothic ProN", serif;
      font-weight: 500;
      font-size: clamp(22px, 4vw, 28px);
      line-height: 1.5;
      color: var(--ink);
      margin-bottom: 28px;
      position: relative;
      z-index: 1;
    }

    .input-wrap { position: relative; z-index: 1; }
    .answer-input {
      width: 100%;
      font-family: "Noto Sans KR", sans-serif;
      font-size: 20px;
      padding: 18px 20px;
      border: 2px solid var(--line);
      border-radius: 18px;
      background: var(--cream);
      color: var(--ink);
      resize: vertical;
      min-height: 80px;
      transition: border-color 0.2s ease, background 0.2s ease;
    }
    .answer-input::placeholder {
      color: var(--ink-mute);
      font-family: inherit;
      font-size: 15px;
    }
    .answer-input:focus {
      outline: none;
      border-color: var(--pink);
      background: var(--white);
    }
    .answer-input:disabled { opacity: 0.7; cursor: not-allowed; }

    .actions {
      display: flex;
      gap: 12px;
      margin-top: 18px;
      flex-wrap: wrap;
      position: relative;
      z-index: 1;
    }
    .btn {
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      padding: 12px 22px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--pink), var(--pink-deep));
      color: var(--white);
      box-shadow: 0 8px 20px -8px rgba(231, 107, 138, 0.6);
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 24px -8px rgba(231, 107, 138, 0.7);
    }
    .btn-primary:disabled {
      background: var(--ink-mute);
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    .btn-ghost {
      background: var(--white);
      color: var(--ink-soft);
      border: 1.5px solid var(--line);
    }
    .btn-ghost:hover {
      border-color: var(--pink);
      color: var(--pink-deep);
    }
    .btn-next {
      background: linear-gradient(135deg, var(--pink-deep), var(--pink-darker));
      color: var(--white);
      box-shadow: 0 8px 20px -8px rgba(200, 77, 110, 0.6);
    }
    .btn-next:hover { transform: translateY(-2px); }

    .hint {
      margin-top: 14px;
      padding: 12px 16px;
      background: var(--yellow-soft);
      border-radius: 14px;
      font-size: 14px;
      color: #8a6a26;
      position: relative;
      z-index: 1;
    }
    .hint::before { content: "💡 "; }

    .result {
      margin-top: 28px;
      position: relative;
      z-index: 1;
      animation: fadeUp 0.4s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .verdict {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 18px;
      border-radius: 16px;
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 20px;
    }
    .verdict-correct { background: var(--green-soft); color: #2f7c5e; }
    .verdict-partial { background: var(--yellow-soft); color: #8a6a26; }
    .verdict-wrong { background: var(--red-soft); color: #a23838; }
    .verdict .emoji { font-size: 22px; }

    .answer-block {
      background: var(--bg-soft);
      border-radius: 18px;
      padding: 20px 22px;
      margin-bottom: 18px;
    }
    .answer-block .label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.18em;
      color: var(--pink-deep);
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .answer-ko {
      font-family: "Noto Sans KR", sans-serif;
      font-size: 26px;
      font-weight: 500;
      color: var(--ink);
      line-height: 1.4;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .answer-roman {
      font-style: italic;
      color: var(--pink-darker);
      font-size: 15px;
      margin-top: 6px;
      font-family: "Plus Jakarta Sans", serif;
    }
    .speak-btn {
      background: var(--white);
      border: 1.5px solid var(--line);
      width: 38px;
      height: 38px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }
    .speak-btn:hover {
      background: var(--pink);
      color: var(--white);
      border-color: var(--pink);
      transform: scale(1.08);
    }
    .your-answer {
      font-family: "Noto Sans KR", sans-serif;
      font-size: 18px;
      color: var(--ink-soft);
      margin-top: 4px;
    }

    .section-title {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--pink-deep);
      text-transform: uppercase;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .section-title::before {
      content: "";
      width: 6px;
      height: 6px;
      background: var(--pink);
      border-radius: 50%;
    }

    .words-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 10px;
      margin-bottom: 22px;
    }
    .word-item {
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px 14px;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .word-item:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 16px -8px rgba(231, 107, 138, 0.3);
    }
    .word-ko {
      font-family: "Noto Sans KR", sans-serif;
      font-size: 20px;
      font-weight: 600;
      color: var(--ink);
    }
    .word-roman {
      font-style: italic;
      color: var(--pink-darker);
      font-size: 13px;
      margin-top: 2px;
    }
    .word-ja {
      font-size: 13px;
      color: var(--ink-soft);
      margin-top: 4px;
      line-height: 1.45;
    }

    .grammar-block {
      background: linear-gradient(135deg, #fff5f7 0%, #fff 100%);
      border: 1px solid var(--line);
      border-left: 4px solid var(--pink);
      border-radius: 14px;
      padding: 16px 18px;
      font-size: 14px;
      line-height: 1.75;
      color: var(--ink);
    }
    .grammar-block strong {
      color: var(--pink-darker);
      font-weight: 700;
    }
    .grammar-block code {
      font-family: "Noto Sans KR", "JetBrains Mono", monospace;
      background: var(--bg-soft);
      padding: 1px 6px;
      border-radius: 4px;
      color: var(--pink-darker);
      font-size: 0.95em;
    }

    .next-wrap {
      margin-top: 22px;
      display: flex;
      justify-content: center;
    }

    .footer {
      margin-top: 56px;
      text-align: center;
      font-size: 12px;
      color: var(--ink-mute);
    }
    .footer .heart { color: var(--pink-deep); }

    .diff-correct { color: var(--green); font-weight: 600; }
    .diff-wrong { color: var(--red); text-decoration: line-through; }
    .diff-missing { color: var(--pink-darker); font-weight: 600; background: var(--bg-soft); padding: 0 4px; border-radius: 3px; }

    @media (max-width: 640px) {
      .container { padding: 28px 16px 64px; }
      .card { padding: 26px 22px; border-radius: 22px; }
      .question-ja { font-size: 20px; }
      .answer-ko { font-size: 22px; }
      .answer-input { font-size: 18px; }
      .stat-pill { padding: 8px 12px; font-size: 12px; }
      .btn { padding: 10px 18px; font-size: 13px; }
    }
  </style>
</head>
<body>
  <span class="petal">🌸</span>
  <span class="petal">🌷</span>
  <span class="petal">💗</span>
  <span class="petal">🌸</span>

  <div class="container">
    <header class="header">
      <span class="header-eyebrow">Korean Output Trainer</span>
      <h1>
        Daily <span class="accent">한국어</span> Talk
        <span class="ko-title">안녕하세요！매일 한 문장 한국어 출력</span>
      </h1>
      <p>TOPIK 1〜4級レベルの日本語文を韓国語にしてみよう。매일 조금씩、続けることが一番。</p>

      <div class="stats">
        <span class="stat-pill"><span class="icon">🔥</span>連続 <span class="value" id="streak">0</span> 日</span>
        <span class="stat-pill"><span class="icon">🌷</span>今日 <span class="value" id="today-count">0</span> / 10</span>
        <span class="stat-pill"><span class="icon">📚</span>累計 <span class="value" id="total">0</span> 文</span>
      </div>
    </header>

    <div class="settings">
      <button class="level-btn active" data-level="all">ALL</button>
      <button class="level-btn" data-level="1">TOPIK 1</button>
      <button class="level-btn" data-level="2">TOPIK 2</button>
      <button class="level-btn" data-level="3">TOPIK 3</button>
      <button class="level-btn" data-level="4">TOPIK 4</button>
      <button class="level-btn" data-level="fav">⭐ お気に入り</button>
    </div>

    <main class="card">
      <div class="card-head">
        <span class="level-badge" id="level-badge">TOPIK 1</span>
        <button class="fav-btn" id="fav-btn" title="お気に入り">☆</button>
      </div>

      <div class="question-label">Translate to Korean</div>
      <div class="question-ja" id="question-ja">読み込み中…</div>

      <div class="input-wrap">
        <textarea
          class="answer-input ko"
          id="answer-input"
          placeholder="ここに韓国語で入力（例：저는 학생이에요）"
          autocomplete="off"
          spellcheck="false"
        ></textarea>
      </div>

      <div class="actions">
        <button class="btn btn-primary" id="check-btn">✿ 答え合わせ</button>
        <button class="btn btn-ghost" id="hint-btn">💡 ヒント</button>
        <button class="btn btn-ghost" id="skip-btn">⤴ スキップ</button>
      </div>

      <div id="hint-area"></div>
      <div id="result-area"></div>
    </main>

    <footer class="footer">
      <p>화이팅！<span class="heart">♡</span> 매일 한 문장씩 천천히</p>
    </footer>
  </div>

  <script>
    // ---- Sentence Dataset (TOPIK 1〜4) ----
    const SENTENCES = [
      // ===== TOPIK 1 =====
      {
        ja: "こんにちは。", ko: "안녕하세요.", roman: "annyeonghaseyo.", topik: 1,
        words: [
          { ko: "안녕", roman: "annyeong", ja: "安寧／こんにちは（挨拶語幹）" },
          { ko: "하다", roman: "hada", ja: "する（基本動詞）" },
          { ko: "-세요", roman: "-seyo", ja: "丁寧の尊敬語尾" }
        ],
        grammar: "「안녕」は漢字「安寧」の意で「平和に」。<strong>-(으)세요</strong> は尊敬の丁寧形語尾。別れは <code>안녕히 가세요</code>（去る人へ）／ <code>안녕히 계세요</code>（残る人へ）と使い分ける。"
      },
      {
        ja: "ありがとうございます。", ko: "감사합니다.", roman: "gamsahamnida.", topik: 1,
        words: [
          { ko: "감사", roman: "gamsa", ja: "感謝" },
          { ko: "하다", roman: "hada", ja: "する" },
          { ko: "-ㅂ니다", roman: "-mnida", ja: "公式的な丁寧語尾（합쇼体）" }
        ],
        grammar: "<strong>-ㅂ니다／-습니다</strong> は最もフォーマルな丁寧形（합쇼体）。柔らかい해요体は <code>감사해요</code>、ネイティブ語の <code>고마워요</code> もよく使う。返事は <code>천만에요</code>。",
        alts: ["고맙습니다", "감사해요", "고마워요"]
      },
      {
        ja: "私は学生です。", ko: "저는 학생이에요.", roman: "jeoneun haksaeng-ieyo.", topik: 1,
        words: [
          { ko: "저", roman: "jeo", ja: "私（謙譲）" },
          { ko: "-는", roman: "-neun", ja: "主題助詞「は」" },
          { ko: "학생", roman: "haksaeng", ja: "学生" },
          { ko: "-이에요", roman: "-ieyo", ja: "〜です（パッチム有）" }
        ],
        grammar: "<strong>「N + 이에요/예요」</strong>＝「Nです」。<strong>パッチム有→이에요、無→예요</strong>。<code>-입니다</code> はよりフォーマル。<code>저</code>（謙譲の私）と <code>나</code>（タメ口の私）を使い分ける。",
        alts: ["저는 학생입니다"]
      },
      {
        ja: "お名前は何ですか？", ko: "이름이 뭐예요?", roman: "ireumi mwoyeyo?", topik: 1,
        words: [
          { ko: "이름", roman: "ireum", ja: "名前" },
          { ko: "-이", roman: "-i", ja: "主格助詞" },
          { ko: "뭐", roman: "mwo", ja: "何（무엇の口語形）" },
          { ko: "-예요", roman: "-yeyo", ja: "〜ですか" }

    // ---- State ----
    const STORAGE_KEY = "ko-practice-v1";
    const defaultState = {

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return { ...defaultState };
        return { ...defaultState, ...JSON.parse(raw) };
      } catch {
        return { ...defaultState };
      }
    }
    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    const state = loadState();

    function todayStr() {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
    }
    function yesterdayStr() {
      const d = new Date();
      d.setDate(d.getDate() - 1);
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
    }

    function rollDayIfNeeded() {
      const today = todayStr();

    function getPool() {
      if (state.level === "all") return SENTENCES.map((s, i) => ({ s, i }));
      if (state.level === "fav") {
        return SENTENCES
          .map((s, i) => ({ s, i }))
          .filter(({ i }) => state.favorites.includes(i));

    }

    function pickNext() {
      const pool = getPool();
      if (pool.length === 0) {
        currentItem = null;
        currentIdx = -1;
        elQuestion.textContent = state.level === "fav"
          ? "お気に入りの文がまだありません。⭐を押して登録してね。"
          : "この条件の文がありません。";

        elInput.disabled = true;
        elCheckBtn.disabled = true;

        elResult.innerHTML = "";
        elLevelBadge.style.visibility = "hidden";
        return;

      elLevelBadge.style.visibility = "visible";
      elInput.disabled = false;
      elCheckBtn.disabled = false;

      const unseen = pool.filter(({ i }) => !state.seenIds.includes(i));
      const pickFrom = unseen.length > 0 ? unseen : pool;
      const idx = Math.floor(Math.random() * pickFrom.length);
      const picked = pickFrom[idx];

      state.seenIds.push(picked.i);
      if (state.seenIds.length > Math.max(20, Math.floor(SENTENCES.length * 0.6))) {
        state.seenIds.shift();

      currentIdx = picked.i;

    function showHint() {
      if (!currentItem) return;
      const first = currentItem.ko.split(/\s/)[0];
      const len = currentItem.ko.replace(/\s/g, "").length;
      elHintArea.innerHTML = `<div class="hint">最初の単語は <strong class="ko">${first}</strong>、合計 ${len} 文字（スペース除く）</div>`;
    }

    function normalize(s) {
      return (s || "")
        .replace(/[\s　]/g, "")
        .replace(/[，。．、！？!?,.;:；：]/g, "")
        .trim();
    }

    function compareAnswer(user, correct) {
      const u = normalize(user);
      const c = normalize(correct);
      if (u === c) return { verdict: "correct" };
      if (u.length === 0) return { verdict: "wrong", diff: "（未入力）" };

      const m = u.length, n = c.length;
      const dp = Array.from({ length: m + 1 }, () => new Array(n + 1).fill(0));
      for (let i = 1; i <= m; i++) {
        for (let j = 1; j <= n; j++) {
          if (u[i - 1] === c[j - 1]) dp[i][j] = dp[i - 1][j - 1] + 1;
          else dp[i][j] = Math.max(dp[i - 1][j], dp[i][j - 1]);
        }
      }
      const lcs = dp[m][n];
      const similarity = (2 * lcs) / (m + n);

      let i = m, j = n;
      const ops = [];
      while (i > 0 && j > 0) {
        if (u[i - 1] === c[j - 1]) { ops.push({ type: "ok", ch: c[j - 1] }); i--; j--; }
        else if (dp[i - 1][j] >= dp[i][j - 1]) { ops.push({ type: "extra", ch: u[i - 1] }); i--; }
        else { ops.push({ type: "miss", ch: c[j - 1] }); j--; }
      }
      while (i > 0) { ops.push({ type: "extra", ch: u[i - 1] }); i--; }
      while (j > 0) { ops.push({ type: "miss", ch: c[j - 1] }); j--; }
      ops.reverse();
      const diff = ops.map(op => {
        if (op.type === "ok") return `<span class="diff-correct">${op.ch}</span>`;
        if (op.type === "miss") return `<span class="diff-missing">${op.ch}</span>`;
        return `<span class="diff-wrong">${op.ch}</span>`;
      }).join("");

      return {
        verdict: similarity > 0.7 ? "partial" : "wrong",
        diff,
        similarity
      };
    }

    function checkAlternatives(user) {
      const u = normalize(user);
      if (normalize(currentItem.ko) === u) return true;
      if (currentItem.alts) {
        return currentItem.alts.some(a => normalize(a) === u);
      }
      return false;
    }

      const cmp = compareAnswer(user, currentItem.ko);
      const isCorrect = checkAlternatives(user) || cmp.verdict === "correct";

        verdictHTML = `<div class="verdict verdict-correct"><span class="emoji">🌸</span>완벽해요！すばらしい！</div>`;

        verdictHTML = `<div class="verdict verdict-partial"><span class="emoji">🌷</span>아쉬워요！もう少し！</div>`;
      } else {
        verdictHTML = `<div class="verdict verdict-wrong"><span class="emoji">💭</span>모범 답안을 봐요</div>`;

      const wordsHTML = currentItem.words.map(w => `

          <div class="word-roman">${w.roman}</div>

      const yourAnswerHTML = (user && !isCorrect)
        ? `<div class="your-answer"><span style="color:var(--ink-mute);font-size:12px;">あなたの答え：</span><br>${cmp.diff || user}</div>`
        : "";

      const altsHTML = (currentItem.alts && currentItem.alts.length > 0)
        ? `<div style="margin-top:10px;font-size:13px;color:var(--ink-soft);">他の自然な言い方: <span class="ko" style="color:var(--ink);">${currentItem.alts.join(" / ")}</span></div>`
        : "";

      elResult.innerHTML = `
        <div class="result">
          ${verdictHTML}

          <div class="answer-block">
            <div class="label">모범 답안 (模範解答)</div>
            <div class="answer-ko ko">
              <span>${currentItem.ko}</span>
              <button class="speak-btn" id="speak-btn" title="発音を聞く">🔊</button>
            </div>
            <div class="answer-roman">${currentItem.roman}</div>
            ${yourAnswerHTML}
            ${altsHTML}
          </div>

          <div class="section-title">単語</div>
          <div class="words-grid">${wordsHTML}</div>

          <div class="section-title">文法ポイント</div>
          <div class="grammar-block">${currentItem.grammar}</div>

          <div class="next-wrap">
            <button class="btn btn-next" id="next-btn">次の文へ ✿</button>
          </div>
        </div>
      `;

      $("#speak-btn").addEventListener("click", () => speak(currentItem.ko));
      $("#next-btn").addEventListener("click", pickNext);

      if (!checked) {
        const today = todayStr();
        if (state.lastDate === today) {
          state.todayCount += 1;
        } else {
          if (state.lastDate === yesterdayStr()) {
            state.streak += 1;
          } else {
            state.streak = 1;
          }
          state.lastDate = today;
          state.todayCount = 1;
        }
        state.total += 1;
        renderStats();
        saveState();
      }
      checked = true;
      elCheckBtn.disabled = true;
      elInput.disabled = true;

      setTimeout(() => speak(currentItem.ko), 350);
    }

    // ---- TTS voice handling ----
    let koVoice = null;
    function pickKoVoice() {
      if (!window.speechSynthesis) return;
      const voices = window.speechSynthesis.getVoices();
      if (!voices || voices.length === 0) return;
      const preferredNames = [
        "Yuna", "Suhyun", "Heami",
        "Microsoft Heami", "Microsoft SunHi",
        "Google 한국의", "Google 한국어"
      ];
      koVoice =
        voices.find(v => /^ko[-_]KR/i.test(v.lang) && preferredNames.some(n => v.name.includes(n))) ||
        voices.find(v => /^ko[-_]KR/i.test(v.lang)) ||
        voices.find(v => /^ko/i.test(v.lang)) ||
        null;
    }
    if (window.speechSynthesis) {
      pickKoVoice();
      window.speechSynthesis.addEventListener("voiceschanged", pickKoVoice);
    }

    function speak(text) {
      try {
        const synth = window.speechSynthesis;
        if (!synth) return;
        synth.cancel();
        if (!koVoice) pickKoVoice();
        const u = new SpeechSynthesisUtterance(text);
        if (koVoice) {
          u.voice = koVoice;
          u.lang = koVoice.lang;
        } else {
          u.lang = "ko-KR";
        }
        u.rate = 0.9;
        u.pitch = 1;
        synth.speak(u);
      } catch (e) {}
    }

    function updateFavButton() {
      if (currentIdx === -1) return;
      const on = state.favorites.includes(currentIdx);
      elFavBtn.classList.toggle("active", on);
      elFavBtn.textContent = on ? "⭐" : "☆";
    }
    elFavBtn.addEventListener("click", () => {
      if (currentIdx === -1) return;
      const idx = state.favorites.indexOf(currentIdx);
      if (idx >= 0) state.favorites.splice(idx, 1);
      else state.favorites.push(currentIdx);
      saveState();
      updateFavButton();
    });

    function renderStats() {
      elStreak.textContent = state.streak;
      elTodayCount.textContent = state.todayCount;
      elTotal.textContent = state.total;
      if (state.todayCount >= 10) {
        elTodayCount.classList.add("goal-met");
      } else {
        elTodayCount.classList.remove("goal-met");
      }
    }
    renderStats();

    function setLevel(lv) {
      state.level = lv;
      levelBtns.forEach(b => b.classList.toggle("active", b.dataset.level === lv));
      saveState();
      pickNext();
    }
    levelBtns.forEach(btn => {
      btn.classList.toggle("active", btn.dataset.level === state.level);
      btn.addEventListener("click", () => setLevel(btn.dataset.level));
    });

    elCheckBtn.addEventListener("click", () => {
      if (!currentItem || checked) return;
      renderResult(elInput.value);
    });
    elHintBtn.addEventListener("click", showHint);
    elSkipBtn.addEventListener("click", pickNext);
    elInput.addEventListener("keydown", (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === "Enter") {
        e.preventDefault();
        elCheckBtn.click();
      }
    });

    pickNext();
  </script>
</body>
</html>
