<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>100 Days_Challenges</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet"
  />

  <style>
    :root {
      --bg: #fff7f2;
      --bg-soft: #ffeee4;
      --pink: #ff8fa9;
      --pink-deep: #e76b8a;
      --peach: #ffc6a8;
      --cream: #fffaf6;
      --ink: #4a2f3a;
      --ink-soft: #8a6a76;
      --line: #f3d9d3;
      --shadow: 0 14px 30px -18px rgba(231, 107, 138, 0.45);
      --shadow-hover: 0 24px 50px -22px rgba(231, 107, 138, 0.6);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: "Plus Jakarta Sans", -apple-system, "Hiragino Kaku Gothic ProN",
        "Yu Gothic UI", sans-serif;
      color: var(--ink);
      background: var(--bg);
      background-image:
        radial-gradient(circle at 12% 10%, #ffd9d0 0%, transparent 45%),
        radial-gradient(circle at 88% 5%, #ffe6d2 0%, transparent 40%),
        radial-gradient(circle at 50% 95%, #ffe4ec 0%, transparent 50%);
      background-attachment: fixed;
      min-height: 100vh;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 64px 32px 96px;
    }

    /* ---- Header ---- */
    .header {
      text-align: center;
      margin-bottom: 72px;
      position: relative;
    }

    .header-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--pink-deep);
      background: #fff;
      padding: 8px 16px;
      border-radius: 999px;
      box-shadow: var(--shadow);
      margin-bottom: 24px;
    }

    .header-eyebrow::before {
      content: "✿";
      font-size: 14px;
    }

    .header h1 {
      font-family: "Fraunces", serif;
      font-weight: 600;
      font-size: clamp(44px, 8vw, 88px);
      line-height: 1.05;
      letter-spacing: -0.02em;
      color: var(--ink);
    }

    .header h1 .underscore {
      color: var(--pink);
      font-style: italic;
    }

    .header h1 .accent {
      font-style: italic;
      font-weight: 500;
      color: var(--pink-deep);
    }

    .header p {
      margin-top: 20px;
      font-size: 16px;
      color: var(--ink-soft);
      max-width: 520px;
      margin-left: auto;
      margin-right: auto;
    }

    .progress {
      margin-top: 32px;
      display: inline-flex;
      align-items: center;
      gap: 14px;
      background: #fff;
      padding: 12px 20px;
      border-radius: 999px;
      box-shadow: var(--shadow);
      font-size: 13px;
      color: var(--ink-soft);
    }

    .progress-bar {
      width: 160px;
      height: 6px;
      border-radius: 999px;
      background: var(--bg-soft);
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 4%; /* ← 進捗に合わせて手動で変えてもOK（例：Day 10なら 10%） */
      background: linear-gradient(90deg, var(--peach), var(--pink));
      border-radius: 999px;
      transition: width 0.6s ease;
    }

    .progress-count {
      font-family: "JetBrains Mono", monospace;
      color: var(--ink);
      font-weight: 500;
    }

    /* ---- Grid ---- */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 24px;
    }

    .card {
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 220px;
      padding: 28px;
      background: var(--cream);
      border: 1px solid var(--line);
      border-radius: 22px;
      text-decoration: none;
      color: inherit;
      box-shadow: var(--shadow);
      overflow: hidden;
      transition: transform 0.35s cubic-bezier(0.2, 0.8, 0.2, 1),
        box-shadow 0.35s ease, border-color 0.35s ease;
      animation: fadeUp 0.6s ease backwards;
    }

    /* card decorative blob */
    .card::before {
      content: "";
      position: absolute;
      top: -40px;
      right: -40px;
      width: 120px;
      height: 120px;
      background: radial-gradient(circle, #ffd6dd 0%, transparent 70%);
      border-radius: 50%;
      opacity: 0.7;
      transition: transform 0.5s ease;
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
      border-color: #ffc7d1;
    }

    .card:hover::before {
      transform: scale(1.3);
    }

    .card-day {
      display: inline-flex;
      align-items: baseline;
      gap: 4px;
      font-family: "JetBrains Mono", monospace;
      font-size: 12px;
      font-weight: 500;
      color: var(--pink-deep);
      letter-spacing: 0.05em;
      padding: 6px 12px;
      background: #fff;
      border-radius: 999px;
      width: fit-content;
      border: 1px solid var(--line);
      position: relative;
      z-index: 1;
    }

    .card-day .num {
      font-size: 13px;
      font-weight: 600;
      color: var(--pink-deep);
    }

    .card-title {
      font-family: "Fraunces", serif;
      font-weight: 500;
      font-size: 24px;
      line-height: 1.25;
      letter-spacing: -0.01em;
      color: var(--ink);
      margin-top: 20px;
      position: relative;
      z-index: 1;
    }

    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-top: 24px;
      position: relative;
      z-index: 1;
    }

    .card-date {
      font-family: "JetBrains Mono", monospace;
      font-size: 12px;
      color: var(--ink-soft);
      letter-spacing: 0.05em;
    }

    .card-arrow {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--bg-soft);
      display: grid;
      place-items: center;
      transition: background 0.3s ease, transform 0.3s ease;
    }

    .card:hover .card-arrow {
      background: var(--pink);
      transform: rotate(-45deg);
    }

    .card-arrow svg {
      width: 14px;
      height: 14px;
      stroke: var(--ink);
      transition: stroke 0.3s ease;
    }

    .card:hover .card-arrow svg {
      stroke: #fff;
    }

    /* placeholder card (まだ作っていない日) */
    .card-placeholder {
      background: transparent;
      border: 1.5px dashed #ecc7c7;
      box-shadow: none;
      color: var(--ink-soft);
      cursor: default;
      pointer-events: none;
    }

    .card-placeholder::before {
      display: none;
    }

    .card-placeholder .card-title {
      color: #c9a9b1;
      font-style: italic;
    }

    .card-placeholder .card-day {
      background: transparent;
      color: #c9a9b1;
      border-color: #ecc7c7;
    }

    .card-placeholder .card-day .num {
      color: #c9a9b1;
    }

    .card-placeholder .card-arrow {
      background: transparent;
      border: 1px dashed #ecc7c7;
    }

    .card-placeholder .card-arrow svg {
      stroke: #c9a9b1;
    }

    /* ---- Footer ---- */
    .footer {
      margin-top: 96px;
      text-align: center;
      font-size: 13px;
      color: var(--ink-soft);
    }

    .footer .heart {
      color: var(--pink-deep);
    }

    /* ---- Animation ---- */
    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card:nth-child(1) { animation-delay: 0.05s; }
    .card:nth-child(2) { animation-delay: 0.1s; }
    .card:nth-child(3) { animation-delay: 0.15s; }
    .card:nth-child(4) { animation-delay: 0.2s; }

    /* ---- Mobile ---- */
    @media (max-width: 640px) {
      .container {
        padding: 40px 20px 64px;
      }

      .header {
        margin-bottom: 48px;
      }

      .grid {
        grid-template-columns: 1fr;
        gap: 16px;
      }

      .card {
        min-height: 180px;
        padding: 24px;
      }

      .card-title {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- ---- Header ---- -->
    <header class="header">
      <span class="header-eyebrow">My 100 Days Journey</span>
      <h1>
        100 Days<span class="underscore">_</span><br />
        <span class="accent">Challenges</span>
      </h1>
      <p>毎日ひとつずつツールやLPなどを作成し、公開していく100日間の記録です。</p>

      <div class="progress">
        <span>Progress</span>
        <div class="progress-bar">
          <div class="progress-fill"></div>
        </div>
        <span class="progress-count">004 / 100</span>
      </div>
    </header>

    <!-- ---- Cards Grid ---- -->
    <main class="grid">
      <!--
        🌸 カードを追加するときは、下の <a class="card"> ... </a> をコピーして
           ・href="dayX.html" のリンク先
           ・<span class="num">01</span> の番号
           ・<h2 class="card-title"> の作品名
           ・<time> の日付
           を書き換えてください。
      -->
      <a href="day1.html" class="card">
        <span class="card-day">Day <span class="num">01</span></span>
        <h2 class="card-title">はじめての作品</h2>
        <div class="card-footer">
          <time class="card-date" datetime="2026-05-09">2026.05.09</time>
          <span class="card-arrow" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="5" y1="12" x2="19" y2="12"></line>
              <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
          </span>
        </div>
      </a>

      <a href="day2.html" class="card">
        <span class="card-day">Day <span class="num">02</span></span>
        <h2 class="card-title">4-7-8 ブレスガイド</h2>
        <div class="card-footer">
          <time class="card-date" datetime="2026-05-09">2026.05.09</time>
          <span class="card-arrow" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="5" y1="12" x2="19" y2="12"></line>
              <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
          </span>
        </div>
      </a>

      <a href="day3.html" class="card">
        <span class="card-day">Day <span class="num">03</span></span>
        <h2 class="card-title">クリニックLP</h2>
        <div class="card-footer">
          <time class="card-date" datetime="2026-05-10">2026.05.10</time>
          <span class="card-arrow" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="5" y1="12" x2="19" y2="12"></line>
              <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
          </span>
        </div>
      </a>

      <a href="day4.html" class="card">
        <span class="card-day">Day <span class="num">04</span></span>
        <h2 class="card-title">Catch Me If You Can</h2>
        <div class="card-footer">
          <time class="card-date" datetime="2026-05-13">2026.05.13</time>
          <span class="card-arrow" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="5" y1="12" x2="19" y2="12"></line>
              <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
          </span>
        </div>
      </a>

      <!-- ✨ サンプル：これから作るカードのプレビュー（不要なら消してOK） -->
      <div class="card card-placeholder">
        <span class="card-day">Day <span class="num">05</span></span>
        <h2 class="card-title">Coming soon...</h2>
        <div class="card-footer">
          <time class="card-date">- - - - . - - . - -</time>
          <span class="card-arrow" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="5" y1="12" x2="19" y2="12"></line>
              <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
          </span>
        </div>
      </div>
    </main>

    <!-- ---- Footer ---- -->
    <footer class="footer">
      <p>Built by usami_louis</p>
    </footer>
  </div>
</body>
</html>
