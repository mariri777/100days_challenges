<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>おくる言葉 — 送別・お祝いの一言メーカー</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@400;500;600&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f6f1e8;
    --paper:#fffdf8;
    --ink:#332f28;
    --sub:#8b8372;
    --line:#e8dfcd;
    --rule:#efe7d6;
    --gold:#b0894c;
    --gold-soft:#cbac72;
    --gold-bg:#f3e9d4;
    --accent:#a8683f;
    --shadow:rgba(120,100,60,.12);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{overflow-x:hidden}
  body{
    font-family:"Zen Kaku Gothic New",sans-serif;
    background:
      radial-gradient(1200px 600px at 50% -10%, #fbf6ec 0%, var(--bg) 60%);
    color:var(--ink);
    line-height:1.8;
    min-height:100vh;
    padding:0 20px 64px;
    -webkit-font-smoothing:antialiased;
  }
  .mincho{font-family:"Shippori Mincho B1",serif;}

  .wrap{max-width:680px;margin:0 auto;}

  /* ---- header ---- */
  header{text-align:center;padding:52px 0 28px;}
  .kicker{
    font-size:.72rem;letter-spacing:.35em;color:var(--gold);
    font-weight:500;margin-bottom:18px;text-indent:.35em;
  }
  .kicker .dot{display:inline-block;margin:0 .5em;color:var(--gold-soft);}
  h1{
    font-family:"Shippori Mincho B1",serif;
    font-weight:600;font-size:2.15rem;letter-spacing:.08em;
    color:var(--ink);margin-bottom:14px;
  }
  .lead{font-size:.9rem;color:var(--sub);letter-spacing:.04em;}

  /* ---- panel ---- */
  .panel{
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:18px;
    padding:28px 26px 30px;
    box-shadow:0 18px 40px -24px var(--shadow);
    margin-bottom:22px;
  }
  .field{margin-bottom:24px;}
  .field:last-child{margin-bottom:0;}
  .label{
    display:flex;align-items:center;gap:.5em;
    font-size:.8rem;font-weight:700;letter-spacing:.08em;
    color:var(--ink);margin-bottom:12px;
  }
  .label .no{
    font-family:"Shippori Mincho B1",serif;
    color:var(--gold);font-size:.9rem;font-weight:500;
  }

  .chips{display:flex;flex-wrap:wrap;gap:9px;}
  .chip{
    font-family:inherit;font-size:.86rem;
    padding:9px 15px;border-radius:999px;
    border:1px solid var(--line);background:#fbf7ee;
    color:var(--sub);cursor:pointer;transition:.18s;
    letter-spacing:.03em;
  }
  .chip:hover{border-color:var(--gold-soft);color:var(--ink);}
  .chip[aria-pressed="true"]{
    background:var(--gold-bg);border-color:var(--gold-soft);
    color:var(--accent);font-weight:500;
    box-shadow:inset 0 0 0 1px var(--gold-soft);
  }

  .name-input{
    width:100%;font-family:inherit;font-size:.95rem;color:var(--ink);
    padding:12px 14px;border:1px solid var(--line);border-radius:12px;
    background:#fbf7ee;letter-spacing:.03em;
  }
  .name-input:focus{outline:none;border-color:var(--gold-soft);background:#fff;}
  .name-input::placeholder{color:#bcb4a2;}
  .hint{font-size:.72rem;color:var(--sub);margin-top:8px;letter-spacing:.02em;}

  /* ---- generate button ---- */
  .go{
    width:100%;font-family:"Shippori Mincho B1",serif;
    font-size:1.02rem;letter-spacing:.14em;font-weight:500;
    color:#fff;background:linear-gradient(135deg,#c19a57,#a8763c);
    border:none;border-radius:14px;padding:16px;cursor:pointer;
    box-shadow:0 12px 26px -12px rgba(160,120,50,.6);
    transition:.18s;
  }
  .go:hover{transform:translateY(-1px);box-shadow:0 16px 30px -12px rgba(160,120,50,.7);}
  .go:active{transform:translateY(0);}

  /* ---- result (便箋) ---- */
  .result{
    margin-top:22px;
    background:
      linear-gradient(var(--paper),var(--paper)) padding-box,
      linear-gradient(135deg,var(--gold-soft),#e7d3a6) border-box;
    border:1.5px solid transparent;
    border-radius:18px;
    padding:34px 30px 26px;
    position:relative;
    box-shadow:0 20px 44px -26px var(--shadow);
    display:none;
  }
  .result.show{display:block;animation:rise .5s ease;}
  @keyframes rise{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
  .seal{
    position:absolute;top:20px;right:22px;
    width:40px;height:40px;border-radius:50%;
    background:var(--accent);color:#fbe7d8;
    font-family:"Shippori Mincho B1",serif;font-size:1.15rem;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 4px 12px -4px rgba(150,80,40,.6);
    letter-spacing:0;
  }
  .letter{
    font-family:"Shippori Mincho B1",serif;
    font-size:1.06rem;line-height:2.15;color:var(--ink);
    letter-spacing:.04em;white-space:pre-wrap;
    /* faint ruled lines */
    background-image:repeating-linear-gradient(
      to bottom, transparent 0, transparent 43.6px, var(--rule) 43.6px, var(--rule) 44.6px);
    background-position:0 6px;
    padding-bottom:6px;
    min-height:44px;
  }
  .letter .to{color:var(--accent);font-weight:500;}

  .result-actions{
    display:flex;gap:10px;margin-top:24px;flex-wrap:wrap;
  }
  .act{
    flex:1;min-width:130px;font-family:inherit;font-size:.86rem;
    padding:12px;border-radius:11px;cursor:pointer;transition:.16s;
    letter-spacing:.06em;font-weight:500;
  }
  .act.re{background:#fbf7ee;border:1px solid var(--line);color:var(--sub);}
  .act.re:hover{border-color:var(--gold-soft);color:var(--ink);}
  .act.copy{background:var(--ink);border:1px solid var(--ink);color:#f6efe0;}
  .act.copy:hover{background:#433d33;}
  .act.copy.done{background:#5a7a52;border-color:#5a7a52;}

  .placeholder{
    margin-top:22px;text-align:center;color:var(--sub);
    font-size:.85rem;padding:30px 10px;border:1px dashed var(--line);
    border-radius:16px;letter-spacing:.05em;background:#fdfaf3;
  }
  .placeholder .mk{font-family:"Shippori Mincho B1",serif;color:var(--gold-soft);font-size:1.4rem;display:block;margin-bottom:8px;}

  footer.foot{text-align:center;margin-top:40px;}
  .foot a{color:var(--sub);font-size:.78rem;text-decoration:none;letter-spacing:.08em;border-bottom:1px solid var(--line);padding-bottom:2px;}
  .foot a:hover{color:var(--gold);}

  @media (max-width:640px){
    header{padding:38px 0 22px;}
    h1{font-size:1.72rem;}
    .panel{padding:22px 18px 24px;border-radius:15px;}
    .result{padding:28px 20px 22px;}
    .letter{font-size:1rem;line-height:2.05;
      background-image:repeating-linear-gradient(to bottom,transparent 0,transparent 40.6px,var(--rule) 40.6px,var(--rule) 41.6px);}
    .chip{font-size:.82rem;padding:8px 13px;}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="kicker">FAREWELL &amp; CELEBRATION <span class="dot">・</span> MESSAGE</div>
    <h1 class="mincho">おくる言葉</h1>
    <p class="lead">寄せ書きやメッセージカードに。相手とシーンを選ぶだけ。</p>
  </header>

  <div class="panel">
    <div class="field">
      <div class="label"><span class="no">一</span>おくる相手は？</div>
      <div class="chips" id="relChips"></div>
    </div>

    <div class="field">
      <div class="label"><span class="no">二</span>どんなシーン？</div>
      <div class="chips" id="sceneChips"></div>
    </div>

    <div class="field">
      <div class="label"><span class="no">三</span>言葉のトーン</div>
      <div class="chips" id="toneChips"></div>
    </div>

    <div class="field">
      <div class="label"><span class="no">四</span>お相手の呼び方 <span style="color:var(--sub);font-weight:400;font-size:.72rem;">（任意）</span></div>
      <input class="name-input" id="name" type="text" placeholder="例：田中さん / お母さん / ゆか" maxlength="20" autocomplete="off">
      <div class="hint">入力すると、書き出しに「◯◯ へ」が入ります。</div>
    </div>

    <button class="go mincho" id="go">言葉をおくる</button>
  </div>

  <div class="placeholder" id="placeholder">
    <span class="mk">寿</span>
    相手・シーン・トーンを選んで、<br>「言葉をおくる」を押してください。
  </div>

  <div class="result" id="result">
    <div class="seal mincho" id="seal">寿</div>
    <div class="letter" id="letter"></div>
    <div class="result-actions">
      <button class="act re" id="re">べつの言い回し</button>
      <button class="act copy" id="copy">コピーする</button>
    </div>
  </div>

  <footer class="foot">
    <a href="index.html">← 100 Days Challenge にもどる</a>
  </footer>
</div>

<script>
  const $ = id => document.getElementById(id);

  const RELATIONS = [
    {id:'senior', label:'上司・目上'},
    {id:'peer',   label:'同僚・仲間'},
    {id:'junior', label:'後輩・部下'},
    {id:'friend', label:'友人'},
    {id:'family', label:'家族・親族'},
  ];
  const SCENES = [
    {id:'taishoku', label:'退職', cat:'farewell', seal:'贈'},
    {id:'idou',     label:'異動・転勤', cat:'farewell', seal:'贈'},
    {id:'shoushin', label:'昇進・栄転', cat:'celebrate', seal:'祝'},
    {id:'kekkon',   label:'結婚', cat:'celebrate', seal:'寿'},
    {id:'shussan',  label:'出産', cat:'celebrate', seal:'祝'},
    {id:'tanjyo',   label:'誕生日', cat:'celebrate', seal:'祝'},
    {id:'kaiki',    label:'快気・回復', cat:'celebrate', seal:'祝'},
    {id:'kansha',   label:'日頃の感謝', cat:'thanks', seal:'謝'},
  ];
  const TONES = [
    {id:'formal', label:'あらたまった'},
    {id:'soft',   label:'やわらかい'},
  ];

  // 書き出し：相手 × トーン（シーン共通のあたたかい一言）
  const OPENINGS = {
    senior:{
      formal:["日頃より格別のお力添えを賜り、心より御礼申し上げます。","いつもあたたかくお導きくださり、深く感謝しております。"],
      soft:["いつも気にかけてくださって、本当にありがとうございます。","折にふれて支えていただき、感謝の気持ちでいっぱいです。"]},
    peer:{
      formal:["いつもともに歩んでくださり、心より感謝しています。","日々支え合えたことを、とてもありがたく思っています。"],
      soft:["いつもそばで助けてくれて、本当にありがとう。","一緒に過ごせた時間は、私の宝物です。"]},
    junior:{
      formal:["いつもひたむきに取り組む姿に、たくさんの刺激をもらいました。","そのまっすぐな頑張りに、いつも励まされていました。"],
      soft:["いつも一生懸命で、こちらが元気をもらっていました。","頑張り屋さんなあなたを、ずっと見ていました。"]},
    friend:{
      formal:["いつもそばで支えてくれて、心から感謝しています。","変わらず寄り添ってくれること、本当にありがたく思います。"],
      soft:["いつも一緒にいてくれて、ありがとう。","そばにいてくれるだけで、心づよいよ。"]},
    family:{
      formal:["いつも家族を思いやってくれて、心から感謝しています。","日々のさりげない支えに、深く感謝しています。"],
      soft:["いつも本当に、ありがとう。","そばにいてくれること、いつも心づよく思っています。"]},
  };

  // 本文：シーン × トーン
  const BODIES = {
    taishoku:{
      formal:["この度のご退職、長い間のお勤め本当にお疲れさまでした。ここで示してくださったお姿は、これからも私たちの目標であり続けます。",
              "新たな門出を迎えられますこと、心よりお慶び申し上げます。これまで賜ったご厚情を、決して忘れません。",
              "惜しむ気持ちは尽きませんが、次の道での一層のご活躍を、心より楽しみにしております。"],
      soft:["卒業おめでとう…と言いたいような、さみしいような。長い間、本当にお疲れさま。",
            "新しい一歩、こころから応援しています。ここで過ごした日々を、私はずっと忘れません。",
            "また会える日を楽しみに。どうか元気で、次の場所でも輝いてね。"]},
    idou:{
      formal:["新天地でのご栄転、心よりお祝い申し上げます。少し距離は離れても、変わらぬご縁を願っております。",
              "これまでのご厚情に、深く感謝いたします。新しい場所でのご活躍を、遠くより応援しております。"],
      soft:["新しい場所でも、あなたらしくのびのびと。少しさみしいけれど、うれしい門出だね。",
            "離れても、これまでのつながりは変わらないよ。落ち着いたら、また近況を聞かせてね。"]},
    shoushin:{
      formal:["ご昇進、誠におめでとうございます。日頃の努力が実を結ばれたこと、我がことのように嬉しく存じます。",
              "新たなご重責、心よりお祝い申し上げます。そのお人柄なら、きっと多くの方に慕われることと存じます。"],
      soft:["昇進おめでとう！いつも頑張っている姿を見ていたから、自分のことみたいに嬉しいよ。",
            "新しい立場、あなたなら大丈夫。無理しすぎず、あなたらしくね。"]},
    kekkon:{
      formal:["ご結婚、誠におめでとうございます。おふたりの門出に、心からの祝福を申し上げます。",
              "末永いお幸せを、心よりお祈り申し上げます。あたたかなご家庭を築かれますよう。"],
      soft:["結婚おめでとう！ふたりの毎日が、笑顔であふれますように。",
            "しあわせそうなあなたを見られて、私まで嬉しいよ。どうぞ、お幸せに。"]},
    shussan:{
      formal:["ご出産、誠におめでとうございます。新しい命の誕生を、心よりお祝い申し上げます。",
              "お健やかなご成長と、ご家族皆さまのお幸せを、心よりお祈りいたします。"],
      soft:["赤ちゃん誕生おめでとう！まずは、どうかゆっくり休んでね。",
            "あたらしい家族との毎日が、やさしい光でつつまれますように。"]},
    tanjyo:{
      formal:["お誕生日おめでとうございます。この一年が、実り多きすこやかな日々となりますように。",
              "新しい歳を迎えられましたこと、心よりお祝い申し上げます。"],
      soft:["お誕生日おめでとう！あなたにとって、笑顔の多い一年になりますように。",
            "生まれてきてくれて、そばにいてくれて、ありがとう。すてきな一年を。"]},
    kaiki:{
      formal:["ご全快、誠におめでとうございます。何よりの朗報に、心より安堵しております。",
              "どうかご無理をなさらず、これからはお身体を大切にお過ごしください。"],
      soft:["元気になって、本当によかった。無理はせず、少しずつでいいからね。",
            "また笑顔が見られてうれしいよ。これからはゆっくり、お大事に。"]},
    kansha:{
      formal:["日頃の感謝を、この機会に改めてお伝えできればと思います。いつも本当にありがとうございます。",
              "言葉にする機会は少ないけれど、あなたの存在に、いつも助けられています。"],
      soft:["面と向かうと照れちゃうけど…いつも本当にありがとう。",
            "あたりまえになっている優しさに、ちゃんと感謝しています。"]},
  };

  // 結び：カテゴリ × トーン
  const CLOSINGS = {
    farewell:{
      formal:["これからのご健勝とご多幸を、心よりお祈り申し上げます。","またお目にかかれる日を、楽しみにしております。"],
      soft:["体に気をつけて、どうか元気でね。","また会えるのを、楽しみにしているよ。"]},
    celebrate:{
      formal:["末永いご多幸を、心よりお祈り申し上げます。","これからの毎日が、笑顔にあふれますように。"],
      soft:["これからの毎日が、しあわせでいっぱいになりますように。","心から、おめでとう。"]},
    thanks:{
      formal:["これからも、どうぞよろしくお願いいたします。","変わらぬご縁に、感謝を込めて。"],
      soft:["これからも、どうぞよろしくね。","ありがとうの気持ちを込めて。"]},
  };

  const state = {rel:'peer', scene:'taishoku', tone:'formal'};

  // --- build chips ---
  function buildChips(el, list, key){
    el.innerHTML = '';
    list.forEach(item=>{
      const b = document.createElement('button');
      b.className='chip';
      b.textContent=item.label;
      b.setAttribute('aria-pressed', state[key]===item.id);
      b.onclick=()=>{
        state[key]=item.id;
        [...el.children].forEach(c=>c.setAttribute('aria-pressed', c===b));
      };
      el.appendChild(b);
    });
  }
  buildChips($('relChips'), RELATIONS, 'rel');
  buildChips($('sceneChips'), SCENES, 'scene');
  buildChips($('toneChips'), TONES, 'tone');

  const pick = arr => arr[Math.floor(Math.random()*arr.length)];

  function compose(){
    const sceneObj = SCENES.find(s=>s.id===state.scene);
    const cat = sceneObj.cat;
    const opening = pick(OPENINGS[state.rel][state.tone]);
    const body    = pick(BODIES[state.scene][state.tone]);
    const closing = pick(CLOSINGS[cat][state.tone]);
    const name = $('name').value.trim();

    let html='', text='';
    if(name){
      html += `<span class="to">${escapeHtml(name)} へ</span>\n\n`;
      text += `${name} へ\n\n`;
    }
    html += `${escapeHtml(opening)}${escapeHtml(body)}\n${escapeHtml(closing)}`;
    text += `${opening}${body}\n${closing}`;

    $('letter').innerHTML = html;
    $('seal').textContent = sceneObj.seal;
    lastText = text;
  }

  let lastText = '';
  function escapeHtml(s){return s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}

  function show(){
    compose();
    $('placeholder').style.display='none';
    const r=$('result');
    r.classList.remove('show'); void r.offsetWidth; r.classList.add('show');
    $('copy').classList.remove('done');
    $('copy').textContent='コピーする';
  }

  $('go').onclick=show;
  $('re').onclick=()=>{compose(); $('copy').classList.remove('done'); $('copy').textContent='コピーする';};

  $('copy').onclick=async()=>{
    try{
      await navigator.clipboard.writeText(lastText);
    }catch(e){
      const ta=document.createElement('textarea');
      ta.value=lastText; document.body.appendChild(ta); ta.select();
      document.execCommand('copy'); ta.remove();
    }
    const b=$('copy'); b.classList.add('done'); b.textContent='コピーしました ✓';
    setTimeout(()=>{b.classList.remove('done'); b.textContent='コピーする';},1800);
  };
</script>
</body>
</html>
