<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>わすれもの帖 — 持ち物チェックリスト</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@400;500;600&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#eef0ec;
    --paper:#fffdf9;
    --ink:#2d3338;
    --sub:#8a8f8c;
    --line:#e3e2da;
    --accent:#3f6d84;
    --accent-soft:#6d99ad;
    --accent-bg:#e6eef1;
    --done:#9aa6a3;
    --shadow:rgba(60,80,90,.13);
    --danger:#b06a5f;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{overflow-x:hidden}
  body{
    font-family:"Zen Kaku Gothic New",sans-serif;
    background:radial-gradient(1100px 560px at 50% -8%, #f6f6f1 0%, var(--bg) 62%);
    color:var(--ink);line-height:1.75;min-height:100vh;
    padding:0 20px 60px;-webkit-font-smoothing:antialiased;
  }
  .mincho{font-family:"Shippori Mincho B1",serif;}
  .wrap{max-width:640px;margin:0 auto;}

  header{text-align:center;padding:48px 0 24px;}
  .kicker{font-size:.72rem;letter-spacing:.34em;color:var(--accent);font-weight:500;margin-bottom:16px;text-indent:.34em;}
  h1{font-family:"Shippori Mincho B1",serif;font-weight:600;font-size:2.1rem;letter-spacing:.09em;margin-bottom:12px;}
  .lead{font-size:.88rem;color:var(--sub);letter-spacing:.03em;}
  .lead .suit{color:var(--accent-soft);}

  /* ---- scene chips ---- */
  .scenes{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:22px;}
  .scene{
    font-family:inherit;font-size:.84rem;padding:8px 15px;border-radius:999px;
    border:1px solid var(--line);background:var(--paper);color:var(--sub);
    cursor:pointer;transition:.16s;letter-spacing:.03em;
  }
  .scene:hover{border-color:var(--accent-soft);color:var(--ink);}
  .scene[aria-pressed="true"]{
    background:var(--accent);border-color:var(--accent);color:#fff;font-weight:500;
    box-shadow:0 6px 14px -8px var(--shadow);
  }

  /* ---- card ---- */
  .card{
    background:var(--paper);border:1px solid var(--line);border-radius:18px;
    box-shadow:0 18px 40px -26px var(--shadow);overflow:hidden;
  }
  .card-head{
    padding:20px 22px 18px;border-bottom:1px solid var(--line);
    display:flex;align-items:center;justify-content:space-between;gap:14px;
    background:linear-gradient(var(--paper),#fbfaf5);
  }
  .ch-title{font-family:"Shippori Mincho B1",serif;font-size:1.2rem;letter-spacing:.06em;display:flex;align-items:center;gap:9px;}
  .ch-title .ic{color:var(--accent-soft);display:flex;}
  .ch-count{font-size:.82rem;color:var(--sub);white-space:nowrap;}
  .ch-count b{font-family:"Shippori Mincho B1",serif;color:var(--accent);font-size:1.15rem;font-weight:600;}

  .bar{height:5px;background:var(--accent-bg);}
  .bar-fill{height:100%;width:0;background:linear-gradient(90deg,var(--accent-soft),var(--accent));transition:width .35s ease;}

  /* ---- banner when all done ---- */
  .alldone{
    display:none;text-align:center;padding:14px;font-family:"Shippori Mincho B1",serif;
    letter-spacing:.1em;color:var(--accent);background:var(--accent-bg);font-size:.98rem;
  }
  .alldone.show{display:block;animation:fade .4s ease;}
  @keyframes fade{from{opacity:0}to{opacity:1}}

  /* ---- list ---- */
  ul.list{list-style:none;}
  li.item{
    display:flex;align-items:center;gap:13px;padding:13px 22px;
    border-bottom:1px solid #f0efe8;transition:background .15s;
  }
  li.item:last-child{border-bottom:none;}
  li.item:hover{background:#fbfaf4;}
  .box{
    flex:none;width:24px;height:24px;border-radius:50%;
    border:1.8px solid var(--accent-soft);background:#fff;cursor:pointer;
    display:flex;align-items:center;justify-content:center;transition:.16s;
  }
  .box svg{width:13px;height:13px;stroke:#fff;stroke-width:3;fill:none;
    stroke-linecap:round;stroke-linejoin:round;opacity:0;transform:scale(.5);transition:.16s;}
  li.done .box{background:var(--accent);border-color:var(--accent);}
  li.done .box svg{opacity:1;transform:scale(1);}
  .txt{flex:1;font-size:.98rem;letter-spacing:.02em;word-break:break-word;cursor:pointer;}
  li.done .txt{color:var(--done);text-decoration:line-through;text-decoration-color:var(--accent-soft);}
  .del{
    flex:none;width:28px;height:28px;border-radius:50%;border:none;background:transparent;
    color:#c8c6bd;cursor:pointer;font-size:1.05rem;line-height:1;transition:.14s;
  }
  .del:hover{background:#f6ebe8;color:var(--danger);}

  .empty{padding:30px 22px;text-align:center;color:var(--sub);font-size:.86rem;}

  /* ---- add row ---- */
  .add{display:flex;gap:9px;padding:15px 18px;border-top:1px solid var(--line);background:#fbfaf5;}
  .add input{
    flex:1;font-family:inherit;font-size:.95rem;color:var(--ink);padding:11px 14px;
    border:1px solid var(--line);border-radius:11px;background:#fff;letter-spacing:.02em;
  }
  .add input:focus{outline:none;border-color:var(--accent-soft);}
  .add input::placeholder{color:#bcbcb2;}
  .add button{
    flex:none;font-family:inherit;font-size:.9rem;font-weight:500;padding:0 18px;
    border:none;border-radius:11px;background:var(--accent);color:#fff;cursor:pointer;transition:.16s;letter-spacing:.05em;
  }
  .add button:hover{background:#355c70;}

  /* ---- footer actions ---- */
  .tools{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap;}
  .tool{
    flex:1;min-width:150px;font-family:inherit;font-size:.82rem;padding:11px;border-radius:11px;
    background:var(--paper);border:1px solid var(--line);color:var(--sub);cursor:pointer;transition:.15s;letter-spacing:.04em;
  }
  .tool:hover{border-color:var(--accent-soft);color:var(--ink);}

  .backlink{text-align:center;margin-top:34px;}
  .backlink a{color:var(--sub);font-size:.78rem;text-decoration:none;letter-spacing:.08em;border-bottom:1px solid var(--line);padding-bottom:2px;}
  .backlink a:hover{color:var(--accent);}

  @media (max-width:640px){
    header{padding:34px 0 20px;}
    h1{font-size:1.68rem;}
    .card-head{padding:16px 16px 14px;}
    li.item{padding:12px 16px;}
    .add{padding:12px 14px;}
    .add button{padding:0 14px;}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="kicker">PACKING CHECKLIST</div>
    <h1 class="mincho">わすれもの帖</h1>
    <p class="lead">シーンを選んで、出かける前にひとつずつ。<span class="suit">忘れ物、ゼロへ。</span></p>
  </header>

  <div class="scenes" id="scenes"></div>

  <div class="card">
    <div class="card-head">
      <div class="ch-title"><span class="ic" id="headIcon"></span><span id="headTitle">旅行</span></div>
      <div class="ch-count"><b id="doneN">0</b> / <span id="totalN">0</span></div>
    </div>
    <div class="bar"><div class="bar-fill" id="barFill"></div></div>
    <div class="alldone" id="allDone">すべて準備OK。いってらっしゃい。</div>
    <ul class="list" id="list"></ul>
    <div class="add">
      <input id="addInput" type="text" placeholder="持ち物を追加（例：日焼け止め）" maxlength="30" autocomplete="off">
      <button id="addBtn">追加</button>
    </div>
  </div>

  <div class="tools">
    <button class="tool" id="clearChecks">チェックを全部外す</button>
    <button class="tool" id="resetList">このリストを最初に戻す</button>
  </div>

  <div class="backlink"><a href="index.html">← 100 Days Challenge にもどる</a></div>
</div>

<script>
  const $ = id => document.getElementById(id);
  const KEY = 'mochimono_v1';

  const SUITCASE = '<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="7" width="18" height="13" rx="2"/><path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="3" y1="12" x2="21" y2="12"/></svg>';

  const PRESETS = {
    travel:  {label:'旅行', items:['財布','スマートフォン','充電器','モバイルバッテリー','常備薬','着替え','歯ブラシ','化粧品・スキンケア','ハンカチ・ティッシュ','折りたたみ傘','エコバッグ','身分証明書']},
    business:{label:'出張', items:['財布','スマートフォン','充電器','名刺','ノートPC','会議の資料','筆記用具','着替え','洗面用具','常備薬','モバイルバッテリー']},
    gym:     {label:'ジム', items:['ウェア','シューズ','タオル','飲み物','着替え','ロッカー用の小銭','汗拭きシート','会員証']},
    kisei:   {label:'帰省', items:['財布','スマートフォン','充電器','手土産','着替え','常備薬','化粧品','チケット・切符']},
    kids:    {label:'子どもとお出かけ', items:['おむつ','おしりふき','着替え','ミルク・離乳食','おやつ','飲み物','母子手帳','おもちゃ','ビニール袋','タオル']},
    camp:    {label:'キャンプ', items:['テント','寝袋','マット','ランタン','クーラーボックス','食材','調理器具','虫よけ','救急セット','ゴミ袋']},
    pool:    {label:'プール・海', items:['水着','タオル','日焼け止め','サンダル','ゴーグル','着替え','ビニール袋','飲み物','帽子']},
    bosai:   {label:'防災', items:['飲料水','非常食','懐中電灯','モバイルバッテリー','救急セット','常備薬','現金','軍手','携帯ラジオ','マスク','ウェットティッシュ','貴重品']},
  };
  const ORDER = ['travel','business','gym','kisei','kids','camp','pool','bosai'];

  let store;
  function load(){
    try{ store = JSON.parse(localStorage.getItem(KEY)) || {}; }catch(e){ store = {}; }
    if(!store.lists) store.lists = {};
    if(!store.active || !PRESETS[store.active]) store.active = 'travel';
    seed(store.active);
  }
  function save(){ localStorage.setItem(KEY, JSON.stringify(store)); }

  function seed(scene){
    if(!store.lists[scene]){
      store.lists[scene] = PRESETS[scene].items.map(t=>({t, done:false}));
    }
  }

  // --- scene chips ---
  function buildScenes(){
    const el = $('scenes'); el.innerHTML='';
    ORDER.forEach(id=>{
      const b=document.createElement('button');
      b.className='scene'; b.textContent=PRESETS[id].label;
      b.setAttribute('aria-pressed', store.active===id);
      b.onclick=()=>{ store.active=id; seed(id); save(); buildScenes(); render(); };
      el.appendChild(b);
    });
  }

  function render(){
    const scene = store.active;
    const list = store.lists[scene];
    $('headTitle').textContent = PRESETS[scene].label;
    $('headIcon').innerHTML = SUITCASE;

    const ul = $('list'); ul.innerHTML='';
    if(list.length===0){
      const li=document.createElement('li');
      li.className='empty'; li.textContent='持ち物がありません。下から追加してください。';
      ul.appendChild(li);
    }
    list.forEach((item, i)=>{
      const li=document.createElement('li');
      li.className='item'+(item.done?' done':'');
      const box=document.createElement('button');
      box.className='box'; box.setAttribute('aria-label','チェック');
      box.innerHTML='<svg viewBox="0 0 24 24"><polyline points="4 12 10 18 20 6"/></svg>';
      const txt=document.createElement('span');
      txt.className='txt'; txt.textContent=item.t;
      const toggle=()=>{ item.done=!item.done; save(); render(); };
      box.onclick=toggle; txt.onclick=toggle;
      const del=document.createElement('button');
      del.className='del'; del.textContent='×'; del.setAttribute('aria-label','削除');
      del.onclick=()=>{ list.splice(i,1); save(); render(); };
      li.append(box, txt, del);
      ul.appendChild(li);
    });

    const total=list.length;
    const done=list.filter(x=>x.done).length;
    $('doneN').textContent=done;
    $('totalN').textContent=total;
    $('barFill').style.width = total? (done/total*100)+'%' : '0%';
    $('allDone').classList.toggle('show', total>0 && done===total);
  }

  $('addBtn').onclick=addItem;
  $('addInput').addEventListener('keydown', e=>{ if(e.key==='Enter') addItem(); });
  function addItem(){
    const v=$('addInput').value.trim();
    if(!v) return;
    store.lists[store.active].push({t:v, done:false});
    $('addInput').value='';
    save(); render();
  }

  $('clearChecks').onclick=()=>{
    store.lists[store.active].forEach(x=>x.done=false);
    save(); render();
  };
  $('resetList').onclick=()=>{
    if(confirm('「'+PRESETS[store.active].label+'」を最初の状態に戻します。追加した項目やチェックは消えます。よろしいですか？')){
      store.lists[store.active] = PRESETS[store.active].items.map(t=>({t, done:false}));
      save(); render();
    }
  };

  load();
  buildScenes();
  render();
</script>
</body>
</html>
