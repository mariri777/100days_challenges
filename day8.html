<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>10-MIN KITCHEN — 10分献立メーカー</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="apple-touch-icon" href="favicon.svg" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet"
  />

  <style>
    :root {
      --cream: #f6efe2;
      --cream-soft: #fbf7ee;
      --paper: #fffdf8;
      --sage: #8aa78b;
      --sage-deep: #6a8a6b;
      --sage-soft: #d7e2d3;
      --terra: #c87856;
      --terra-deep: #a8593a;
      --terra-soft: #f3d8c7;
      --wood: #6e5340;
      --ink: #3e2f24;
      --ink-soft: #7a6655;
      --line: #e5dccb;
      --shadow-sm: 0 4px 12px -6px rgba(110, 83, 64, 0.2);
      --shadow: 0 12px 28px -16px rgba(110, 83, 64, 0.3);
      --shadow-lg: 0 24px 50px -24px rgba(110, 83, 64, 0.4);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: "Plus Jakarta Sans", -apple-system, "Hiragino Kaku Gothic ProN", "Yu Gothic UI", sans-serif;
      color: var(--ink);
      background: var(--cream);
      background-image:
        radial-gradient(circle at 8% 5%, #ecdcb8 0%, transparent 40%),
        radial-gradient(circle at 92% 95%, #d7e2d3 0%, transparent 45%);
      background-attachment: fixed;
      min-height: 100vh;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 880px;
      margin: 0 auto;
      padding: 48px 24px 96px;
    }

    /* ---- Back link ---- */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--ink-soft);
      text-decoration: none;
      margin-bottom: 32px;
      transition: color 0.3s;
    }
    .back-link:hover { color: var(--terra-deep); }
    .back-link::before { content: "←"; }

    /* ---- Header ---- */
    .header {
      text-align: center;
      margin-bottom: 56px;
      position: relative;
    }

    .header-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--sage-deep);
      background: var(--paper);
      padding: 8px 18px;
      border-radius: 999px;
      box-shadow: var(--shadow-sm);
      margin-bottom: 20px;
    }
    .header-eyebrow::before { content: "🌿"; font-size: 12px; }

    .header h1 {
      font-family: "Fraunces", serif;
      font-weight: 500;
      font-size: clamp(36px, 6.5vw, 64px);
      line-height: 1.1;
      letter-spacing: -0.02em;
      color: var(--wood);
    }
    .header h1 .accent {
      font-style: italic;
      color: var(--terra-deep);
    }
    .header .lede {
      margin-top: 18px;
      font-size: 15px;
      color: var(--ink-soft);
      max-width: 460px;
      margin-left: auto;
      margin-right: auto;
    }

    /* ---- Section ---- */
    .step {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 32px 28px;
      margin-bottom: 20px;
      box-shadow: var(--shadow-sm);
    }

    .step-head {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 22px;
    }
    .step-num {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--sage);
      color: var(--paper);
      display: grid;
      place-items: center;
      font-family: "JetBrains Mono", monospace;
      font-size: 13px;
      font-weight: 600;
      flex-shrink: 0;
    }
    .step-title {
      font-family: "Fraunces", serif;
      font-size: 22px;
      font-weight: 500;
      color: var(--wood);
      letter-spacing: -0.01em;
    }
    .step-hint {
      font-size: 13px;
      color: var(--ink-soft);
      margin-top: 4px;
    }

    /* ---- Ingredient categories ---- */
    .cat-group { margin-bottom: 22px; }
    .cat-group:last-child { margin-bottom: 0; }

    .cat-label {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.1em;
      color: var(--terra-deep);
      text-transform: uppercase;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .cat-label::before {
      content: "";
      width: 16px;
      height: 1.5px;
      background: var(--terra);
      display: block;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      cursor: pointer;
      user-select: none;
    }
    .chip input { display: none; }
    .chip span {
      display: inline-block;
      padding: 8px 14px;
      font-size: 13px;
      background: var(--cream-soft);
      border: 1.5px solid var(--line);
      border-radius: 999px;
      color: var(--ink);
      transition: all 0.2s ease;
    }
    .chip:hover span {
      border-color: var(--sage);
      transform: translateY(-1px);
    }
    .chip input:checked + span {
      background: var(--sage);
      border-color: var(--sage);
      color: var(--paper);
      font-weight: 500;
    }

    /* ---- Free text ---- */
    .free-text-wrap { margin-top: 22px; }
    .free-text-wrap input {
      width: 100%;
      padding: 12px 16px;
      font-family: inherit;
      font-size: 14px;
      color: var(--ink);
      background: var(--cream-soft);
      border: 1.5px solid var(--line);
      border-radius: 14px;
      transition: border-color 0.3s;
    }
    .free-text-wrap input:focus {
      outline: none;
      border-color: var(--sage);
    }
    .free-text-wrap input::placeholder {
      color: #b9a994;
    }

    /* ---- Count selector ---- */
    .count-options {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }
    .count-option { cursor: pointer; }
    .count-option input { display: none; }
    .count-option > div {
      padding: 16px 8px;
      text-align: center;
      background: var(--cream-soft);
      border: 1.5px solid var(--line);
      border-radius: 14px;
      transition: all 0.2s ease;
    }
    .count-option:hover > div {
      border-color: var(--sage);
    }
    .count-option input:checked + div {
      background: var(--sage-soft);
      border-color: var(--sage);
    }
    .count-option .big {
      font-family: "Fraunces", serif;
      font-size: 26px;
      font-weight: 500;
      color: var(--wood);
      display: block;
    }
    .count-option .label {
      font-size: 11px;
      color: var(--ink-soft);
      letter-spacing: 0.05em;
      margin-top: 2px;
    }
    .count-option input:checked + div .big { color: var(--sage-deep); }

    /* ---- Generate button ---- */
    .generate-wrap {
      text-align: center;
      margin: 36px 0 24px;
    }
    .generate-btn {
      font-family: "Fraunces", serif;
      font-size: 19px;
      font-weight: 500;
      letter-spacing: 0.02em;
      color: var(--paper);
      background: var(--terra);
      border: none;
      padding: 18px 48px;
      border-radius: 999px;
      cursor: pointer;
      box-shadow: var(--shadow);
      transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
      display: inline-flex;
      align-items: center;
      gap: 12px;
    }
    .generate-btn:hover {
      background: var(--terra-deep);
      transform: translateY(-3px);
      box-shadow: var(--shadow-lg);
    }
    .generate-btn:active { transform: translateY(-1px); }
    .generate-btn::after { content: "→"; font-style: italic; }

    /* ---- Result ---- */
    .result-wrap {
      margin-top: 40px;
      display: none;
    }
    .result-wrap.visible {
      display: block;
      animation: fadeUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    .result-head {
      text-align: center;
      margin-bottom: 28px;
    }
    .result-head .label {
      display: inline-block;
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      letter-spacing: 0.2em;
      color: var(--sage-deep);
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .result-head h2 {
      font-family: "Fraunces", serif;
      font-style: italic;
      font-weight: 400;
      font-size: clamp(28px, 5vw, 40px);
      color: var(--wood);
    }

    .recipe-grid {
      display: grid;
      gap: 18px;
    }

    .recipe {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 26px 26px 24px;
      box-shadow: var(--shadow-sm);
      position: relative;
      animation: fadeUp 0.5s backwards;
    }
    .recipe:nth-child(1) { animation-delay: 0.05s; }
    .recipe:nth-child(2) { animation-delay: 0.1s; }
    .recipe:nth-child(3) { animation-delay: 0.15s; }
    .recipe:nth-child(4) { animation-delay: 0.2s; }
    .recipe:nth-child(5) { animation-delay: 0.25s; }

    .recipe-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }
    .recipe-info { flex: 1; min-width: 0; }
    .recipe-tags {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .tag {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      padding: 4px 10px;
      border-radius: 999px;
      text-transform: uppercase;
    }
    .tag-soup {
      background: var(--terra-soft);
      color: var(--terra-deep);
    }
    .tag-side {
      background: var(--sage-soft);
      color: var(--sage-deep);
    }
    .tag-time {
      background: var(--cream-soft);
      color: var(--wood);
      border: 1px solid var(--line);
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .tag-time::before { content: "⏱"; font-size: 11px; }

    .recipe-name {
      font-family: "Fraunces", serif;
      font-size: 22px;
      font-weight: 500;
      line-height: 1.3;
      color: var(--wood);
      letter-spacing: -0.01em;
    }

    .reroll-btn {
      flex-shrink: 0;
      background: var(--cream-soft);
      border: 1px solid var(--line);
      width: 38px;
      height: 38px;
      border-radius: 50%;
      cursor: pointer;
      display: grid;
      place-items: center;
      color: var(--ink-soft);
      transition: all 0.3s ease;
      font-size: 16px;
    }
    .reroll-btn:hover {
      background: var(--terra);
      color: var(--paper);
      border-color: var(--terra);
      transform: rotate(180deg);
    }

    .missing-note {
      background: #fff5e9;
      border: 1px solid #f3d8c7;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 13px;
      color: var(--terra-deep);
      margin-bottom: 16px;
    }
    .missing-note::before { content: "💡 "; }

    .recipe-section {
      margin-top: 14px;
    }
    .recipe-section-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      color: var(--sage-deep);
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .ingredients-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .ingr {
      font-size: 13px;
      padding: 4px 11px;
      border-radius: 999px;
      background: var(--sage-soft);
      color: var(--sage-deep);
      font-weight: 500;
    }
    .ingr.season {
      background: var(--cream-soft);
      color: var(--ink-soft);
      border: 1px solid var(--line);
    }

    .steps-list {
      list-style: none;
      counter-reset: step;
    }
    .steps-list li {
      counter-increment: step;
      padding: 8px 0 8px 36px;
      position: relative;
      font-size: 14px;
      color: var(--ink);
      line-height: 1.6;
    }
    .steps-list li::before {
      content: counter(step);
      position: absolute;
      left: 0;
      top: 8px;
      width: 24px;
      height: 24px;
      background: var(--terra-soft);
      color: var(--terra-deep);
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      font-weight: 600;
    }

    /* ---- Empty/error states ---- */
    .empty-state {
      text-align: center;
      padding: 40px 24px;
      color: var(--ink-soft);
    }
    .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; }

    /* ---- Toast ---- */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--wood);
      color: var(--paper);
      padding: 12px 22px;
      border-radius: 999px;
      font-size: 13px;
      box-shadow: var(--shadow-lg);
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s ease;
      z-index: 100;
    }
    .toast.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ---- Animation ---- */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ---- Mobile ---- */
    @media (max-width: 640px) {
      .container { padding: 32px 16px 64px; }
      .step { padding: 24px 20px; border-radius: 20px; }
      .step-head { gap: 10px; margin-bottom: 18px; }
      .step-title { font-size: 18px; }
      .count-options { grid-template-columns: repeat(2, 1fr); }
      .recipe { padding: 22px 20px 20px; }
      .recipe-name { font-size: 19px; }
      .generate-btn { padding: 16px 36px; font-size: 17px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="index.html" class="back-link">100 Days_Challenges に戻る</a>

    <header class="header">
      <span class="header-eyebrow">Day 08 / Tool</span>
      <h1>
        10-min <span class="accent">Kitchen</span>
      </h1>
      <p class="lede">家にある食材で、10分以内にできる献立を提案します。<br />基本の調味料は家にある前提でOK。</p>
    </header>

    <!-- Step 1: Ingredients -->
    <section class="step">
      <div class="step-head">
        <span class="step-num">01</span>
        <div>
          <div class="step-title">家にある食材をチェック</div>
          <div class="step-hint">いくつでも選んでOK。リストにないものは下の自由入力欄へ。</div>
        </div>
      </div>

      <div class="cat-group">
        <div class="cat-label">野菜・きのこ</div>
        <div class="chips" id="cat-vege"></div>
      </div>

      <div class="cat-group">
        <div class="cat-label">肉・魚</div>
        <div class="chips" id="cat-meat"></div>
      </div>

      <div class="cat-group">
        <div class="cat-label">卵・大豆・乳製品</div>
        <div class="chips" id="cat-egg"></div>
      </div>

      <div class="cat-group">
        <div class="cat-label">乾物・その他</div>
        <div class="chips" id="cat-other"></div>
      </div>

      <div class="free-text-wrap">
        <div class="cat-label">その他（自由入力 / カンマ区切り）</div>
        <input type="text" id="freeText" placeholder="例: アスパラ, ホタテ, 春菊" />
      </div>
    </section>

    <!-- Step 2: Side count -->
    <section class="step">
      <div class="step-head">
        <span class="step-num">02</span>
        <div>
          <div class="step-title">おかずは何品にしますか？</div>
          <div class="step-hint">汁物1品は必ず提案します。基本は一汁三菜。</div>
        </div>
      </div>

      <div class="count-options">
        <label class="count-option">
          <input type="radio" name="sideCount" value="1" />
          <div>
            <span class="big">1</span>
            <div class="label">一汁一菜</div>
          </div>
        </label>
        <label class="count-option">
          <input type="radio" name="sideCount" value="2" />
          <div>
            <span class="big">2</span>
            <div class="label">一汁二菜</div>
          </div>
        </label>
        <label class="count-option">
          <input type="radio" name="sideCount" value="3" checked />
          <div>
            <span class="big">3</span>
            <div class="label">一汁三菜</div>
          </div>
        </label>
        <label class="count-option">
          <input type="radio" name="sideCount" value="4" />
          <div>
            <span class="big">4</span>
            <div class="label">一汁四菜</div>
          </div>
        </label>
      </div>
    </section>

    <div class="generate-wrap">
      <button class="generate-btn" id="generateBtn">献立を作る</button>
    </div>

    <!-- Result -->
    <div class="result-wrap" id="resultWrap">
      <div class="result-head">
        <div class="label">Today's Menu</div>
        <h2>今日の献立</h2>
      </div>
      <div class="recipe-grid" id="recipeGrid"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // ========== 食材カテゴリ ==========
    const INGREDIENTS = {
      vege: ["玉ねぎ", "にんじん", "じゃがいも", "キャベツ", "レタス", "トマト", "きゅうり", "もやし", "ピーマン", "なす", "ほうれん草", "小松菜", "大根", "長ねぎ", "白菜", "ブロッコリー", "しめじ", "えのき", "アボカド"],
      meat: ["鶏むね肉", "鶏もも肉", "豚バラ", "豚こま", "ひき肉", "ベーコン", "ハム", "ウインナー", "鮭", "ツナ缶", "ちくわ"],
      egg: ["卵", "豆腐", "厚揚げ", "油揚げ", "納豆", "牛乳", "チーズ"],
      other: ["わかめ", "海苔", "塩昆布"]
    };

    // ========== 食材エイリアス（自由入力の表記ゆれ吸収） ==========
    const ALIASES = {
      "玉ねぎ": ["たまねぎ", "タマネギ", "玉葱"],
      "にんじん": ["ニンジン", "人参"],
      "じゃがいも": ["ジャガイモ", "ポテト", "馬鈴薯"],
      "キャベツ": ["きゃべつ"],
      "ピーマン": ["ぴーまん"],
      "なす": ["ナス", "茄子"],
      "ほうれん草": ["ホウレンソウ", "ほうれんそう"],
      "長ねぎ": ["ねぎ", "ネギ", "葱", "青ねぎ", "万能ねぎ"],
      "鶏むね肉": ["鶏胸肉", "むね肉", "胸肉", "鶏ムネ"],
      "鶏もも肉": ["もも肉", "鶏もも", "鶏モモ"],
      "豚バラ": ["豚ばら", "豚バラ肉"],
      "豚こま": ["豚コマ", "豚切り落とし", "豚小間"],
      "ひき肉": ["挽肉", "ミンチ", "合いびき肉"],
      "卵": ["たまご", "タマゴ", "玉子"],
      "豆腐": ["とうふ"],
      "ツナ缶": ["ツナ", "シーチキン"],
      "しめじ": ["シメジ"]
    };

    // ========== レシピデータ ==========
    // type: "soup" | "side"
    // time: 調理時間（分）
    // ingredients: 必須メイン食材（基本調味料以外）
    // seasonings: 使う調味料（家にある前提、表示用）
    // steps: 作り方

    const RECIPES = [
      // ===== 汁物 =====
      { id: "s1", type: "soup", name: "ふんわり卵スープ", time: 5,
        ingredients: ["卵", "長ねぎ"], seasonings: ["鶏ガラスープの素", "ごま油", "塩"],
        steps: ["鍋に水400mlと鶏ガラスープの素小さじ2を入れて沸かす", "溶き卵1個を細く回し入れ、固まったら火を止める", "刻んだ長ねぎとごま油少々を加えて完成"] },
      { id: "s2", type: "soup", name: "豆腐とわかめの味噌汁", time: 6,
        ingredients: ["豆腐", "わかめ"], seasonings: ["味噌", "だしの素"],
        steps: ["鍋に水400mlとだしの素小さじ1を入れて沸かす", "豆腐を1.5cm角に切って入れる", "乾燥わかめ大さじ1を入れて1分煮る", "味噌大さじ1.5を溶き入れて完成"] },

    // ========== DOM 構築: 食材チェックボックス ==========
    function renderChips() {
      const catMap = { vege: "cat-vege", meat: "cat-meat", egg: "cat-egg", other: "cat-other" };
      Object.keys(catMap).forEach(cat => {
        const container = document.getElementById(catMap[cat]);
        INGREDIENTS[cat].forEach(item => {
          const label = document.createElement("label");
          label.className = "chip";
          label.innerHTML = `<input type="checkbox" value="${item}" /><span>${item}</span>`;
          container.appendChild(label);
        });
      });
    }
    renderChips();

    // ========== ユーザーの食材を取得（チェックボックス + 自由入力） ==========
    function getUserIngredients() {
      const checked = Array.from(document.querySelectorAll('.chip input:checked')).map(i => i.value);
      const free = document.getElementById('freeText').value
        .split(/[,、\s]+/)
        .map(s => s.trim())
        .filter(Boolean);
      return [...checked, ...free];
    }

    // ========== 食材マッチ判定（エイリアス考慮） ==========
    function userHasIngredient(userList, ingredient) {
      // ingredient はレシピの必要食材（カノニカル名）
      const aliases = ALIASES[ingredient] || [];
      const candidates = [ingredient, ...aliases];
      for (const u of userList) {
        for (const c of candidates) {
          if (u === c) return true;
          if (u.includes(c) || c.includes(u)) return true; // 部分一致
        }
      }
      return false;
    }

    // ========== レシピスコア計算 ==========
    function scoreRecipe(recipe, userList) {
      let matched = 0;
      const missing = [];
      recipe.ingredients.forEach(ing => {
        if (userHasIngredient(userList, ing)) matched++;
        else missing.push(ing);
      });
      return {
        matched,
        missing,
        total: recipe.ingredients.length,
        complete: missing.length === 0
      };
    }

    // ========== レシピ選定 ==========
    function pickRecipes(type, count, userList, excludeIds = []) {
      const candidates = RECIPES
        .filter(r => r.type === type)
        .filter(r => !excludeIds.includes(r.id))
        .map(r => ({ recipe: r, score: scoreRecipe(r, userList) }));

      // 完全マッチを優先、不足が少ない順
      candidates.sort((a, b) => {
        if (a.score.complete && !b.score.complete) return -1;
        if (!a.score.complete && b.score.complete) return 1;
        if (a.score.missing.length !== b.score.missing.length) {
          return a.score.missing.length - b.score.missing.length;
        }
        return Math.random() - 0.5; // 同点はランダム
      });

      // 完全マッチがあるなら不足ありは含めない方針…ではなく、
      // 必要数を満たすまで完全マッチ→1個不足→2個不足の順に取る
      // ただし「全食材を持っていない」レシピはあまり多くは出さない
      const picks = [];
      for (const c of candidates) {
        if (picks.length >= count) break;
        // 不足が3個以上のレシピはスキップ
        if (c.score.missing.length >= 3) continue;
        picks.push(c);
      }
      return picks;
    }

    // ========== レシピカードのHTML生成 ==========
    function renderRecipeCard(pick, slotKey) {
      const { recipe, score } = pick;
      const typeLabel = recipe.type === "soup"
        ? `<span class="tag tag-soup">汁物</span>`
        : `<span class="tag tag-side">おかず</span>`;
      const timeLabel = `<span class="tag tag-time">${recipe.time}分</span>`;
      const missingHTML = score.missing.length > 0
        ? `<div class="missing-note">あと <strong>${score.missing.join("・")}</strong> があれば作れます</div>`
        : "";

      const ingrChips = recipe.ingredients.map(i => {
        const has = userHasIngredient(getUserIngredients(), i);
        return `<span class="ingr" style="${has ? '' : 'opacity:0.6;background:var(--terra-soft);color:var(--terra-deep);'}">${i}</span>`;
      }).join("");
      const seasonChips = recipe.seasonings.map(s => `<span class="ingr season">${s}</span>`).join("");
      const stepsHTML = recipe.steps.map(s => `<li>${s}</li>`).join("");

      return `
        <article class="recipe" data-slot="${slotKey}" data-recipe-id="${recipe.id}">
          <div class="recipe-head">
            <div class="recipe-info">
              <div class="recipe-tags">${typeLabel}${timeLabel}</div>
              <h3 class="recipe-name">${recipe.name}</h3>
            </div>
            <button class="reroll-btn" title="別のレシピに変える" data-slot="${slotKey}">↻</button>
          </div>
          ${missingHTML}
          <div class="recipe-section">
            <div class="recipe-section-title">材料</div>
            <div class="ingredients-list">${ingrChips}</div>
          </div>
          <div class="recipe-section">
            <div class="recipe-section-title">使う調味料</div>
            <div class="ingredients-list">${seasonChips}</div>
          </div>
          <div class="recipe-section">
            <div class="recipe-section-title">作り方</div>
            <ol class="steps-list">${stepsHTML}</ol>
          </div>
        </article>
      `;
    }

    // ========== 現在の献立状態 ==========
    let currentMenu = {}; // slotKey -> { type, recipeId }

    function renderMenu() {
      const grid = document.getElementById('recipeGrid');
      const slots = Object.keys(currentMenu);
      if (slots.length === 0) {
        grid.innerHTML = `
          <div class="empty-state">
            <div class="icon">🍽</div>
            <p>選んだ食材で作れるレシピが見つかりませんでした。<br />食材をもう少し追加して試してみてください。</p>
          </div>`;
        return;
      }
      const userList = getUserIngredients();
      const html = slots.map(slot => {
        const recipe = RECIPES.find(r => r.id === currentMenu[slot]);
        const score = scoreRecipe(recipe, userList);
        return renderRecipeCard({ recipe, score }, slot);
      }).join("");
      grid.innerHTML = html;

      // リロールボタンのイベント
      grid.querySelectorAll('.reroll-btn').forEach(btn => {
        btn.addEventListener('click', () => rerollSlot(btn.dataset.slot));
      });
    }

    function rerollSlot(slotKey) {
      const userList = getUserIngredients();
      const type = slotKey === "soup" ? "soup" : "side";
      const excluded = Object.values(currentMenu);
      const picks = pickRecipes(type, 1, userList, excluded);
      if (picks.length === 0) {
        showToast("別のレシピが見つかりませんでした");
        return;
      }
      currentMenu[slotKey] = picks[0].recipe.id;
      renderMenu();
    }

    // ========== 「献立を作る」処理 ==========
    function generate() {
      const userList = getUserIngredients();
      if (userList.length === 0) {
        showToast("食材を1つ以上選んでください");
        return;
      }

      const sideCount = parseInt(document.querySelector('input[name="sideCount"]:checked').value, 10);

      // 汁物1品 + おかず N品
      currentMenu = {};
      const soupPicks = pickRecipes("soup", 1, userList);
      if (soupPicks.length > 0) currentMenu["soup"] = soupPicks[0].recipe.id;

      const excluded = soupPicks.map(p => p.recipe.id);
      const sidePicks = pickRecipes("side", sideCount, userList, excluded);
      sidePicks.forEach((p, i) => {
        currentMenu[`side${i + 1}`] = p.recipe.id;
      });

      const wrap = document.getElementById('resultWrap');
      wrap.classList.add('visible');
      renderMenu();

      // 結果セクションへスクロール
      setTimeout(() => {
        wrap.scrollIntoView({ behavior: "smooth", block: "start" });
      }, 100);
    }

    document.getElementById('generateBtn').addEventListener('click', generate);

    // ========== トースト ==========
    let toastTimer;
    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('visible');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove('visible'), 2500);
    }
  </script>
</body>
</html>
